<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mganga Mfawidhi</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', Tahoma, sans-serif; background:linear-gradient(135deg,#2c0a3e,#8e44ad); min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:flex-start; }
    .container { background:#fff; border-radius:28px; padding:35px 30px; max-width:1100px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.2); margin-top:20px; }
    h2 { color:#2c0a3e; text-align:center; font-size:28px; margin-bottom:6px; }
    .sub { text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:25px; }
    .logo-area { text-align:center; margin-bottom:16px; }
    .logo-area img { max-height:80px; max-width:100%; border-radius:8px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
    .top-bar .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:8px 18px; border:none; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; transition:0.3s; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary { background:#8e44ad; color:#fff; }
    .btn-primary:hover { background:#7d3c98; transform:translateY(-2px); }
    .btn-secondary { background:#95a5a6; color:#fff; }
    .btn-secondary:hover { background:#7f8c8d; }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-danger:hover { background:#c0392b; }
    .btn-info { background:#3498db; color:#fff; }
    .btn-info:hover { background:#2e86c1; }
    .btn-warning { background:#f39c12; color:#fff; }
    .btn-warning:hover { background:#d68910; }
    .btn-purple { background:#8e44ad; color:#fff; }
    .btn-purple:hover { background:#7d3c98; }
    .btn-whatsapp { background:#25D366; color:#fff; }
    .btn-whatsapp:hover { background:#1da851; }
    .btn-phone { background:#34B7F1; color:#fff; }
    .btn-phone:hover { background:#1a9fd8; }
    .section { background:#f8f9fa; border-radius:16px; padding:20px 22px; margin-bottom:20px; border-left:5px solid #8e44ad; }
    .section h3 { color:#2c0a3e; font-size:18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .section h3 .step { background:#8e44ad; color:#fff; border-radius:50%; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:6px; }
    .form-group.full { grid-column:1/-1; }
    .form-group label { display:block; font-weight:600; color:#2c0a3e; margin-bottom:4px; font-size:13px; }
    .form-group input, .form-group textarea { width:100%; padding:10px 14px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; transition:0.3s; background:#fff; }
    .form-group input:focus, .form-group textarea:focus { border-color:#8e44ad; outline:none; box-shadow:0 0 0 3px rgba(142,68,173,0.15); }
    .form-group textarea { min-height:70px; resize:vertical; }
    .comms { background:#f8f9fa; padding:12px 18px; border-radius:12px; display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:20px; border:1px solid #e0e0e0; }
    .comms span { font-weight:600; color:#2c0a3e; }
    .status-badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600; }
    .status-badge.saved { background:#d4edda; color:#155724; }
    .status-badge.pending { background:#fff3cd; color:#856404; }
    .status-badge.submitted { background:#cce5ff; color:#004085; }
    .button-group { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:20px; }
    .button-group .btn { padding:12px 24px; font-size:14px; }
    .signature-area { border:2px solid #8e44ad; border-radius:12px; padding:10px; background:#fff; margin-top:8px; }
    .signature-area canvas { width:100%; height:150px; border-radius:8px; background:#fff; cursor:crosshair; touch-action:none; }
    .signature-area .sig-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .send-container { background:#e8f0fe; border:2px dashed #8e44ad; border-radius:12px; padding:16px; margin-top:12px; }
    .send-container h4 { color:#2c0a3e; margin-bottom:8px; }
    .data-tabs { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .data-tabs .tab-btn { padding:6px 14px; border:none; border-radius:20px; cursor:pointer; font-size:13px; background:#ecf0f1; color:#7f8c8d; transition:0.3s; }
    .data-tabs .tab-btn.active { background:#8e44ad; color:#fff; }
    .data-tabs .tab-btn:hover { background:#d5d8dc; }
    .data-container { background:#fff; border-radius:12px; padding:10px; border:1px solid #e0e0e0; max-height:320px; overflow-y:auto; }
    .data-item { padding:8px 12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .data-item .badge-role { display:inline-block; padding:2px 10px; border-radius:12px; font-size:10px; font-weight:600; margin-left:6px; }
    .badge-role.worker { background:#27ae60; color:#fff; }
    .badge-role.supervisor { background:#f39c12; color:#fff; }
    .badge-role.incharge { background:#8e44ad; color:#fff; }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); max-width:450px; width:90%; padding:14px 22px; border-radius:14px; color:#fff; text-align:center; z-index:999; opacity:0; transition:0.4s; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#27ae60; }
    .toast.error { background:#e74c3c; }
    .loading { display:inline-block; width:16px; height:16px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:768px){ .form-grid { grid-template-columns:1fr; } .top-bar { flex-direction:column; align-items:stretch; } .button-group .btn { flex:1; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar no-print">
      <h2 style="margin:0;">🏥 Mganga Mfawidhi</h2>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Nyumbani</button>
        <button class="btn btn-info" onclick="window.print()">🖨️ Chapisha</button>
      </div>
    </div>
    <div class="logo-area"><img src="SDA_CHURCH_LOGO.webp" alt="SDA Logo"><br><small style="color:#7f8c8d;">Logo ya SDA Church</small></div>
    <div class="sub" id="greeting">Karibu mganga mfawidhi</div>
    <div class="comms no-print">
      <span>📞 Mawasiliano:</span>
      <a href="tel:+255742710697" class="btn btn-phone" style="padding:4px 14px;font-size:13px;">📱 Simu</a>
      <a href="#" onclick="sendWhatsApp()" class="btn btn-whatsapp" style="padding:4px 14px;font-size:13px;">💬 WhatsApp</a>
    </div>

    <!-- Sehemu 1: Tathmini -->
    <div class="section">
      <h3><span class="step">1</span> Tathmini yako</h3>
      <div class="form-grid">
        <div class="form-group"><label>Jina <span style="color:#e74c3c;">*</span></label><input type="text" id="fullname" placeholder="Dr. Mwinyi"></div>
        <div class="form-group"><label>Idara <span style="color:#e74c3c;">*</span></label><input type="text" id="department" placeholder="Idara ya Afya"></div>
        <div class="form-group"><label>Cheo <span style="color:#e74c3c;">*</span></label><input type="text" id="position" placeholder="Mganga Mfawidhi"></div>
        <div class="form-group"><label>Simu</label><input type="tel" id="phone" placeholder="0712345678"></div>
        <div class="form-group full"><label>Barua Pepe</label><input type="email" id="email" placeholder="mwinyi@mtwara.go.tz"></div>
        <div class="form-group"><label>Uongozi (1-5)</label><input type="number" id="step1_leadership" min="1" max="5" placeholder="4"></div>
        <div class="form-group"><label>Ubora (1-5)</label><input type="number" id="step2_quality" min="1" max="5" placeholder="5"></div>
        <div class="form-group"><label>Uwajibikaji (1-5)</label><input type="number" id="step3_accountability" min="1" max="5" placeholder="4"></div>
        <div class="form-group full"><label>Maelezo</label><textarea id="step_notes" placeholder="Maelezo..."></textarea></div>
        <div class="form-group"><label>Nguvu</label><textarea id="strengths" placeholder="Nguvu zako..."></textarea></div>
        <div class="form-group"><label>Kuboresha</label><textarea id="weaknesses" placeholder="Maeneo ya kuboresha..."></textarea></div>
        <div class="form-group full"><label>Maoni Jumla</label><textarea id="overall_comments" rows="2" placeholder="Maoni ya jumla..."></textarea></div>
      </div>
    </div>

    <!-- Sehemu 2: Sahihi -->
    <div class="section">
      <h3><span class="step">2</span> ✍️ Sahihi</h3>
      <div class="form-grid">
        <div class="form-group full"><label>Jina la Sahihi <span style="color:#e74c3c;">*</span></label><input type="text" id="signature_name" placeholder="Andika jina lako"></div>
        <div class="form-group"><label>Tarehe <span style="color:#e74c3c;">*</span></label><input type="date" id="signature_date"></div>
        <div class="form-group full">
          <label>Chora Sahihi Yako Hapa <span style="color:#e74c3c;">*</span></label>
          <div class="signature-area">
            <canvas id="signatureCanvas"></canvas>
            <div class="sig-actions">
              <button class="btn btn-danger" onclick="clearSignature()" style="padding:6px 14px;font-size:12px;">🗑️ Futa</button>
              <span style="font-size:12px;color:#7f8c8d;">Chora kwa panya au kidole</span>
            </div>
          </div>
        </div>
        <div class="form-group full"><label>Maelezo (hiari)</label><textarea id="signature_notes" placeholder="Maelezo ya ziada..."></textarea></div>
      </div>
    </div>

    <!-- Sehemu 3: Njia za Kutuma -->
    <div class="section">
      <h3><span class="step">3</span> 📤 Njia za Kutuma</h3>
      <div class="send-container">
        <h4>Chagua njia ya kutuma:</h4>
        <div style="display:flex;gap:15px;flex-wrap:wrap;margin-top:8px;">
          <label><input type="radio" name="sendMethodIncharge" value="whatsapp" checked> 💬 WhatsApp</label>
          <label><input type="radio" name="sendMethodIncharge" value="email"> 📧 Barua Pepe</label>
          <label><input type="radio" name="sendMethodIncharge" value="direct"> 📤 Moja kwa Moja</label>
        </div>
      </div>
    </div>

    <!-- Sehemu 4: Tathmini Zilizotumwa -->
    <div class="section">
      <h3><span class="step">4</span> 📋 Tathmini Zilizotumwa</h3>
      <div class="data-tabs">
        <button class="tab-btn active" onclick="loadAllData('all')">📋 Zote</button>
        <button class="tab-btn" onclick="loadAllData('worker')">👤 Mtendakazi</button>
        <button class="tab-btn" onclick="loadAllData('supervisor')">👔 Msimamizi</button>
        <button class="tab-btn" onclick="loadAllData('incharge')">🏥 Yangu</button>
      </div>
      <div id="allDataContainer" class="data-container"><p style="color:#7f8c8d;text-align:center;">Bonyeza kituo cha juu</p></div>
    </div>

    <!-- Vitufe -->
    <div class="button-group no-print">
      <button class="btn btn-primary" onclick="saveAppraisal()" id="saveBtn">💾 Hifadhi</button>
      <button class="btn btn-info" onclick="submitAppraisal()" id="submitBtn">📤 Tuma</button>
      <button class="btn btn-secondary" onclick="loadAppraisal()">📂 Pakia</button>
      <button class="btn btn-danger" onclick="deleteAppraisal()">🗑️ Futa</button>
      <button class="btn btn-success" onclick="showOverall()">📊 Jumla</button>
      <button class="btn btn-purple" onclick="showSpecific()">🎯 Maalumu</button>
      <button class="btn btn-danger" onclick="logout()">🚪 Toka</button>
    </div>
    <div style="text-align:center;margin-top:12px;"><span id="saveStatus" class="status-badge pending">📝 Hajahifadhiwa</span></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const API_KEY = "$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K";
    const BIN_ID = "6a4b0bc9da38895dfe32cc08";

    function showToast(m,t){ const e=document.getElementById('toast'); e.textContent=m; e.className='toast '+t+' show'; setTimeout(()=>e.classList.remove('show'),3500); }
    function getUsername(){ const p=new URLSearchParams(window.location.search).get('user'); if(!p) return null; try{ return JSON.parse(decodeURIComponent(p)).username; } catch(e){ return null; } }
    const username = getUsername();
    if(!username){ showToast('❌ Hakuna mtumiaji','error'); setTimeout(()=>window.location.href='index.html',2000); }
    document.getElementById('greeting').textContent = `Karibu ${username}`;

    // ========================= SIGNATURE =========================
    let canvas, ctx, isDrawing = false, hasSignature = false;
    function initSignature() {
      canvas = document.getElementById('signatureCanvas');
      ctx = canvas.getContext('2d');
      canvas.width = canvas.parentElement.clientWidth - 20;
      canvas.height = 150;
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#2c0a3e';
      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('mouseleave', stopDraw);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
      canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
      canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup', {})); }, { passive: false });
    }
    function getPos(e) { const rect = canvas.getBoundingClientRect(); return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) }; }
    function startDraw(e) { isDrawing = true; hasSignature = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!isDrawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDraw() { isDrawing = false; }
    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSignature = false; showToast('🗑️ Sahihi imefutwa', 'info'); }
    function getSignatureData() { if (!hasSignature) return ''; return canvas.toDataURL('image/png'); }
    function setSignatureData(dataUrl) { if (!dataUrl) { clearSignature(); return; } const img = new Image(); img.onload = function() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); hasSignature = true; }; img.src = dataUrl; }

    function sendWhatsApp(){ const d=getFormData(); const msg=`Nimekamilisha tathmini yangu ya MTWARA.%0A%0A👤 ${d.fullname}%0A⭐ Uongozi: ${d.step1_leadership}/5, Ubora: ${d.step2_quality}/5%0A✍️ Sahihi: ${d.signature_name}%0A💬 Maoni: ${d.overall_comments||'Hakuna'}%0A%0ATafadhali iangalie.`; window.open(`https://wa.me/255742710697?text=${msg}`,'_blank'); }

    function getFormData(){ return {
      username, role:'incharge',
      fullname:document.getElementById('fullname').value,
      department:document.getElementById('department').value,
      position:document.getElementById('position').value,
      phone:document.getElementById('phone').value,
      email:document.getElementById('email').value,
      step1_leadership:+document.getElementById('step1_leadership').value||0,
      step2_quality:+document.getElementById('step2_quality').value||0,
      step3_accountability:+document.getElementById('step3_accountability').value||0,
      step_notes:document.getElementById('step_notes').value,
      strengths:document.getElementById('strengths').value,
      weaknesses:document.getElementById('weaknesses').value,
      overall_comments:document.getElementById('overall_comments').value,
      signature_name:document.getElementById('signature_name').value,
      signature_date:document.getElementById('signature_date').value,
      signature_data:getSignatureData(),
      signature_notes:document.getElementById('signature_notes').value,
      send_method:document.querySelector('input[name="sendMethodIncharge"]:checked')?.value||'whatsapp',
      status:'saved', submitted_to:null, timestamp:new Date().toISOString()
    }}

    function setFormData(d){ ['fullname','department','position','phone','email','step1_leadership','step2_quality','step3_accountability','step_notes','strengths','weaknesses','overall_comments','signature_name','signature_date','signature_notes'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=d[id]||''; }); if(d.signature_data) setSignatureData(d.signature_data); if(d.send_method){ const radio=document.querySelector(`input[name="sendMethodIncharge"][value="${d.send_method}"]`); if(radio) radio.checked=true; } updateStatus(d.status||'saved'); }

    function updateStatus(s){ const map={'saved':['saved','💾 Imehifadhiwa'],'submitted':['submitted','📤 Imetumwa'],'pending':['pending','📝 Hajahifadhiwa']}; const c=map[s]||map.pending; const b=document.getElementById('saveStatus'); b.className='status-badge '+c[0]; b.textContent=c[1]; }

    async function saveAppraisal(){ const b=document.getElementById('saveBtn'); b.disabled=true; b.innerHTML='<span class="loading"></span> Inahifadhi...'; const d=getFormData(); d.status='saved'; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); if(!res.record) res.record={}; const rec=res.record; if(!rec.appraisals) rec.appraisals={}; if(!rec.appraisals.incharge) rec.appraisals.incharge={}; rec.appraisals.incharge[username]=d; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kuhifadhi'); showToast('✅ Imehifadhiwa!','success'); updateStatus('saved'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } b.disabled=false; b.innerHTML='💾 Hifadhi'; }

    async function submitAppraisal(){ const b=document.getElementById('submitBtn'); b.disabled=true; b.innerHTML='<span class="loading"></span> Inatuma...'; const d=getFormData(); if(!d.fullname||!d.department||!d.position){ showToast('❌ Jaza Jina, Idara na Cheo','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } if(!d.signature_name||!d.signature_date){ showToast('❌ Jaza Sahihi (Jina na Tarehe)','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } if(!hasSignature){ showToast('❌ Tafadhali chora sahihi yako','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } d.status='submitted'; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); if(!res.record) res.record={}; const rec=res.record; if(!rec.appraisals) rec.appraisals={}; if(!rec.appraisals.incharge) rec.appraisals.incharge={}; rec.appraisals.incharge[username]=d; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kutuma'); showToast(`✅ Imetumwa kwa ${d.send_method.toUpperCase()}!`,'success'); updateStatus('submitted'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } b.disabled=false; b.innerHTML='📤 Tuma'; }

    async function loadAppraisal(){ try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); const rec=res.record||{}; const d=rec.appraisals?.incharge?.[username]; if(!d) return showToast('❌ Hakuna tathmini','error'); setFormData(d); showToast('✅ Imepakiwa','success'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } }

    async function deleteAppraisal(){ if(!confirm('Futa tathmini hii?')) return; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); const rec=res.record||{}; if(rec.appraisals?.incharge?.[username]){ delete rec.appraisals.incharge[username]; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kufuta'); showToast('✅ Imehifadhiwa','success'); updateStatus('pending'); } else { showToast('❌ Hakuna tathmini','error'); } } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } }

    function showOverall(){ const d=getFormData(); alert(`📊 TATHMINI JUMLA\n\n👤 ${d.fullname||'Hajajazwa'}\n🏢 ${d.department||'Hajajazwa'}\n📋 ${d.position||'Hajajazwa'}\n⭐ Uongozi: ${d.step1_leadership}/5\n⭐ Ubora: ${d.step2_quality}/5\n⭐ Uwajibikaji: ${d.step3_accountability}/5\n✍️ Sahihi: ${d.signature_name||'Hajajazwa'} - ${d.signature_date||''}\n💬 Maoni: ${d.overall_comments||'Hakuna'}`); }
    function showSpecific(){ const d=getFormData(); const avg=(+d.step1_leadership+ +d.step2_quality+ +d.step3_accountability)/3; alert(`🎯 TATHMINI MAALUMU\n\n📌 Uongozi: ${d.step1_leadership}/5\n📌 Ubora: ${d.step2_quality}/5\n📌 Uwajibikaji: ${d.step3_accountability}/5\n📊 Wastani: ${avg.toFixed(1)}/5\n📈 Kiwango: ${avg>=4?'🌟 Bora':avg>=3?'✅ Nzuri':avg>=2?'⚠️ Inahitajika Kuboresha':'❌ Dhaifu'}`); }

    async function loadAllData(role='all'){ const c=document.getElementById('allDataContainer'); c.innerHTML='<span class="loading"></span> Inapakia...'; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); const rec=res.record||{}; const app=rec.appraisals||{}; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`.tab-btn[onclick="loadAllData('${role}')"]`)?.classList.add('active'); let html='', count=0; const arr = role==='all' ? ['worker','supervisor','incharge'] : [role]; const labels={worker:'👤 Mtendakazi', supervisor:'👔 Msimamizi', incharge:'🏥 Mganga Mfawidhi'}; const badges={worker:'worker', supervisor:'supervisor', incharge:'incharge'}; arr.forEach(r=>{ const data=app[r]||{}; Object.keys(data).forEach(u=>{ const item=data[u]; if(r!=='incharge' && item.submitted_to!=='incharge' && item.status!=='submitted') return; const icon=item.status==='submitted'?'📤':'💾'; html+=`<div class="data-item"><span><strong>${item.fullname||u}</strong> <span class="badge-role ${badges[r]}">${labels[r]}</span></span><span style="font-size:12px;color:#7f8c8d;">${item.department||''} ${icon} ${item.status||'saved'}</span></div>`; count++; }); }); c.innerHTML = count===0 ? '<p style="color:#7f8c8d;text-align:center;">Hakuna tathmini zilizotumwa.</p>' : html; } catch(e){ c.innerHTML='<p style="color:#e74c3c;">Hitilafu: '+e.message+'</p>'; console.error(e); } }

    function logout(){ window.location.href='index.html'; }
    window.onload = function(){ initSignature(); loadAppraisal(); loadAllData('all'); };
  </script>
