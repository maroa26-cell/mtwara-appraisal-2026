<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mganga Mfawidhi - Tathmini</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f8fe;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            padding: 30px 35px;
        }
        h1 {
            color: #0b3b5c;
            font-size: 28px;
            border-bottom: 3px solid #1a73e8;
            padding-bottom: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 small { font-size: 16px; font-weight: 400; color: #555; }
        .section {
            background: #f9fcff;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 25px;
            border: 1px solid #e3edf7;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #0b3b5c;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title span {
            background: #1a73e8;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 20px;
            margin-bottom: 12px;
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #cfddee;
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #1a73e8;
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }
        textarea { resize: vertical; min-height: 70px; }
        .full-width { grid-column: 1 / -1; }
        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            flex: 1 0 auto;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,115,232,0.3); }
        .btn-success { background: #0f9d58; color: white; }
        .btn-success:hover { background: #0b7a45; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15,157,88,0.3); }
        .btn-outline { background: transparent; border: 2px solid #1a73e8; color: #1a73e8; }
        .btn-outline:hover { background: #1a73e8; color: white; }
        .btn-warning { background: #fbbc04; color: #1e1e1e; }
        .btn-warning:hover { background: #e5ac00; transform: translateY(-2px); }
        .signature-area {
            border: 2px dashed #b0c7db;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            background: #f3f8ff;
            margin-top: 10px;
        }
        #signatureCanvas {
            border: 1px solid #ccc;
            border-radius: 12px;
            background: white;
            touch-action: none;
            width: 100%;
            max-width: 450px;
            height: 150px;
        }
        .signature-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .signature-actions button {
            padding: 6px 18px;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .message-box {
            padding: 14px 20px;
            border-radius: 12px;
            margin: 15px 0;
            display: none;
            font-weight: 500;
        }
        .message-box.success {
            background: #e6f7e6;
            color: #0b5e2e;
            border-left: 5px solid #0f9d58;
            display: block;
        }
        .message-box.error {
            background: #fde8e8;
            color: #a12727;
            border-left: 5px solid #d93025;
            display: block;
        }
        .submissions-list {
            background: #f0f5fa;
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 10px;
        }
        .submissions-list li {
            padding: 6px 0;
            border-bottom: 1px solid #dce7f2;
            list-style: none;
        }
        .submissions-list li:last-child { border-bottom: none; }
        .incharge-phone-field {
            background: #fff8e7;
            padding: 16px 20px;
            border-radius: 12px;
            border-left: 5px solid #fbbc04;
            margin-bottom: 20px;
        }
        @media (max-width: 640px) {
            .container { padding: 16px; }
            .form-row { grid-template-columns: 1fr; }
            .btn-group { flex-direction: column; }
            .btn { flex: 1; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>
        📋 Mganga Mfawidhi - Tathmini
        <small id="userDisplay"></small>
    </h1>

    <!-- Namba yake mwenyewe (inaweza kubadilishwa) -->
    <div class="incharge-phone-field">
        <label style="font-weight:700; color:#b85c00;">📱 Namba yako ya simu (Mganga Mfawidhi)</label>
        <input type="text" id="inchargeSelfPhone" placeholder="0712 345 678" style="margin-top:6px;" />
        <small style="color:#777; display:block; margin-top:4px;">Namba hii itatumiwa kama mpokeaji wa tathmini zote. Badilisha ikiwa unataka kubadilisha namba.</small>
    </div>

    <!-- SEHEMU 1: Tathmini yako mwenyewe -->
    <div class="section">
        <div class="section-title"><span>1</span> Tathmini yako</div>
        <div class="form-row">
            <div class="form-group">
                <label>Jina kamili *</label>
                <input type="text" id="inchargeName" placeholder="Mfano: Dk. Mwanaisha Juma" required />
            </div>
            <div class="form-group">
                <label>Namba ya Simu *</label>
                <input type="text" id="inchargePhone" placeholder="0712 345 678" required />
            </div>
            <div class="form-group">
                <label>Barua Pepe</label>
                <input type="email" id="inchargeEmail" placeholder="mwanaisha@mfano.com" />
            </div>
            <div class="form-group">
                <label>Idara / Kitengo *</label>
                <input type="text" id="inchargeDepartment" placeholder="Mfano: Wodi ya Wazazi" required />
            </div>
            <div class="form-group">
                <label>Cheo *</label>
                <input type="text" id="inchargeTitle" placeholder="Mfano: Mganga Mfawidhi" required />
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Uongozi (1-5)</label>
                <input type="number" id="leadership" min="1" max="5" placeholder="1-5" />
            </div>
            <div class="form-group">
                <label>Ubora wa Huduma (1-5)</label>
                <input type="number" id="serviceQuality" min="1" max="5" placeholder="1-5" />
            </div>
            <div class="form-group">
                <label>Uwajibikaji (1-5)</label>
                <input type="number" id="accountability" min="1" max="5" placeholder="1-5" />
            </div>
            <div class="form-group">
                <label>Maoni yako</label>
                <textarea id="inchargeFeedback" placeholder="Maoni yako kuhusu mfumo..."></textarea>
            </div>
        </div>
    </div>

    <!-- SEHEMU 2: Sahihi -->
    <div class="section">
        <div class="section-title"><span>2</span> Sahihi</div>
        <div class="form-row">
            <div class="form-group">
                <label>Jina la mtia sahihi</label>
                <input type="text" id="signatureName" placeholder="Jina lako kamili" />
            </div>
            <div class="form-group">
                <label>Tarehe</label>
                <input type="date" id="signatureDate" />
            </div>
        </div>
        <div class="signature-area">
            <p style="margin-bottom:10px; font-weight:600;">Chora sahihi yako hapa</p>
            <canvas id="signatureCanvas"></canvas>
            <div class="signature-actions">
                <button type="button" class="btn-outline" style="padding:6px 20px;" onclick="clearSignature()">Futa</button>
            </div>
        </div>
    </div>

    <!-- SEHEMU 3: Tathmini Zilizotumwa (zilizopo kwenye JSONBin) -->
    <div class="section">
        <div class="section-title"><span>3</span> Tathmini Zilizotumwa</div>
        <div id="submissionsList" class="submissions-list">
            <p style="color:#777; font-style:italic;">Zinapakia...</p>
        </div>
        <button class="btn btn-outline" onclick="loadSubmissions()" style="margin-top:12px;">🔄 Refresh</button>
    </div>

    <div id="messageBox" class="message-box"></div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="saveAndSend()">💾 Hifadhi na Kutuma</button>
        <button class="btn btn-success" onclick="sendWhatsApp()">📱 Tuma WhatsApp</button>
        <button class="btn btn-warning" onclick="window.print()">🖨️ Chapisha</button>
        <button class="btn btn-outline" onclick="resetForm()">🔄 Weka Upya</button>
    </div>
    <p style="margin-top:20px; font-size:12px; color:#888; text-align:center;">Hakikisha umejaza sehemu zote muhimu (*).</p>
</div>

<script>
// ============================================
//  1. GET USER & SET INCHARGE PHONE
// ============================================
(function init() {
    const params = new URLSearchParams(window.location.search);
    const userParam = params.get('user');
    if (userParam) {
        try {
            const user = JSON.parse(decodeURIComponent(userParam));
            document.getElementById('userDisplay').textContent = '👤 ' + (user.username || '');
            if (user.username) document.getElementById('inchargeName').value = user.username;
            if (user.credential && user.credential.match(/^[0-9+\-\s()]+$/)) {
                document.getElementById('inchargePhone').value = user.credential;
            }
            // Set self phone from login
            if (user.inchargePhone) {
                document.getElementById('inchargeSelfPhone').value = user.inchargePhone;
            }
        } catch(e) {}
    }
    document.getElementById('signatureDate').valueAsDate = new Date();
    loadSubmissions();
})();

// ============================================
//  2. SIGNATURE CANVAS
// ============================================
let canvas = document.getElementById('signatureCanvas');
let ctx = canvas.getContext('2d');
let isDrawing = false;

function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width || 450;
    canvas.height = 150;
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}
resizeCanvas();

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;
    return { x, y };
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);

canvas.addEventListener('touchstart', function(e) { e.preventDefault(); startDraw(e); });
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); draw(e); });
canvas.addEventListener('touchend', function(e) { e.preventDefault(); stopDraw(); });

function startDraw(e) {
    isDrawing = true;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
    if (!isDrawing) return;
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
}

function stopDraw() {
    isDrawing = false;
}

function clearSignature() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============================================
//  3. JSONBIN
// ============================================
const JSONBIN_BIN_ID = '6a4b0bc9da38895dfe32cc08';
const JSONBIN_ACCESS_KEY = '$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K';

async function saveToJSONBin(data) {
    const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
    try {
        const response = await fetch(url, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Access-Key': JSONBIN_ACCESS_KEY
            },
            body: JSON.stringify(data)
        });
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        return await response.json();
    } catch (error) {
        console.error('JSONBin error:', error);
        throw error;
    }
}

async function loadSubmissions() {
    const listEl = document.getElementById('submissionsList');
    listEl.innerHTML = '<p style="color:#777;">Inapakia...</p>';
    try {
        const url = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        const response = await fetch(url, {
            headers: { 'X-Access-Key': JSONBIN_ACCESS_KEY }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const result = await response.json();
        const data = result.record;
        // If data is an array, show all; if object, show as one
        let items = [];
        if (Array.isArray(data)) {
            items = data;
        } else if (data && typeof data === 'object') {
            // Show the latest submission
            items = [data];
        } else {
            items = [];
        }
        if (items.length === 0) {
            listEl.innerHTML = '<p style="color:#999;">Hakuna tathmini zilizotumwa bado.</p>';
            return;
        }
        let html = '<ul style="list-style:none; padding:0;">';
        items.slice(-10).reverse().forEach((item, idx) => {
            const name = item.workerName || item.supervisorName || item.inchargeName || 'Mtumiaji';
            const role = item.role || 'mtumiaji';
            const date = item.submittedAt ? new Date(item.submittedAt).toLocaleDateString('sw') : 'tarehe haijulikani';
            html += `<li style="padding:8px 0; border-bottom:1px solid #dce7f2;">
                <strong>${name}</strong> (${role}) - <span style="color:#1a73e8;">${date}</span>
                <br><small style="color:#555;">${item.workerDepartment || item.supervisorDepartment || item.inchargeDepartment || ''}</small>
            </li>`;
        });
        html += '</ul>';
        listEl.innerHTML = html;
    } catch (err) {
        listEl.innerHTML = `<p style="color:#d93025;">❌ Hitilafu: ${err.message}</p>`;
    }
}

// ============================================
//  4. FORM DATA
// ============================================
function getFormData() {
    return {
        inchargeName: document.getElementById('inchargeName').value.trim(),
        inchargePhone: document.getElementById('inchargePhone').value.trim(),
        inchargeEmail: document.getElementById('inchargeEmail').value.trim(),
        inchargeDepartment: document.getElementById('inchargeDepartment').value.trim(),
        inchargeTitle: document.getElementById('inchargeTitle').value.trim(),
        leadership: document.getElementById('leadership').value,
        serviceQuality: document.getElementById('serviceQuality').value,
        accountability: document.getElementById('accountability').value,
        inchargeFeedback: document.getElementById('inchargeFeedback').value.trim(),
        signatureName: document.getElementById('signatureName').value.trim(),
        signatureDate: document.getElementById('signatureDate').value,
        signatureImage: canvas.toDataURL('image/png'),
        // self phone for receiving (could be same as inchargePhone)
        inchargeSelfPhone: document.getElementById('inchargeSelfPhone').value.trim() || document.getElementById('inchargePhone').value.trim(),
        submittedAt: new Date().toISOString(),
        role: 'incharge'
    };
}

function validateForm(data) {
    const required = ['inchargeName', 'inchargePhone', 'inchargeDepartment', 'inchargeTitle'];
    for (let field of required) {
        if (!data[field]) {
            return `Tafadhali jaza sehemu ya ${field.replace('incharge','').toLowerCase()}.`;
        }
    }
    if (!data.inchargeSelfPhone) {
        return 'Tafadhali weka namba yako ya simu (Mganga Mfawidhi).';
    }
    return null;
}

function showMessage(text, type) {
    const box = document.getElementById('messageBox');
    box.textContent = text;
    box.className = 'message-box ' + type;
}

function clearMessage() {
    const box = document.getElementById('messageBox');
    box.className = 'message-box';
    box.textContent = '';
}

// ============================================
//  5. SAVE AND SEND
// ============================================
async function saveAndSend() {
    clearMessage();
    const data = getFormData();
    const error = validateForm(data);
    if (error) {
        showMessage(error, 'error');
        return;
    }

    const sigData = canvas.toDataURL('image/png');
    if (sigData === 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==') {
        showMessage('Tafadhali chora sahihi yako.', 'error');
        return;
    }

    try {
        await saveToJSONBin(data);
        showMessage('✅ Data imehifadhiwa kikamilifu! Sasa inatuma WhatsApp...', 'success');
        await sendWhatsApp(data);
        loadSubmissions(); // refresh list
    } catch (err) {
        showMessage('❌ Hitilafu: ' + err.message, 'error');
    }
}

// ============================================
//  6. WHATSAPP
// ============================================
async function sendWhatsApp(data) {
    if (!data) {
        data = getFormData();
        const error = validateForm(data);
        if (error) { showMessage(error, 'error'); return; }
        const sigData = canvas.toDataURL('image/png');
        if (sigData === 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==') {
            showMessage('Tafadhali chora sahihi yako.', 'error');
            return;
        }
    }

    // Use self phone as receiver (inchargeSelfPhone)
    let phone = data.inchargeSelfPhone || document.getElementById('inchargeSelfPhone').value.trim() || data.inchargePhone;
    phone = phone.replace(/[\s\-\(\)]/g, '');
    if (!phone.startsWith('255') && phone.startsWith('0')) phone = '255' + phone.substring(1);
    else if (!phone.startsWith('255') && !phone.startsWith('+')) phone = '255' + phone;
    if (phone.startsWith('+')) phone = phone.substring(1);

    const msg = `*TATHMINI YA MGANGA MFAWIDHI - MTWARA 2026*
    
👤 Jina: ${data.inchargeName}
📞 Simu: ${data.inchargePhone}
📧 Barua Pepe: ${data.inchargeEmail || 'Hajajazwa'}
🏢 Idara: ${data.inchargeDepartment}
👔 Cheo: ${data.inchargeTitle}

*Tathmini:*
Uongozi: ${data.leadership || 'Hajajazwa'}/5
Ubora wa Huduma: ${data.serviceQuality || 'Hajajazwa'}/5
Uwajibikaji: ${data.accountability || 'Hajajazwa'}/5

*Maoni:* ${data.inchargeFeedback || 'Hajajazwa'}

📅 Tarehe: ${data.signatureDate || 'Hajajazwa'}
✍️ Sahihi: ${data.signatureName || 'Hajajazwa'}

*Imetumwa na mfumo wa Tathmini.*`;

    const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
    showMessage('📱 WhatsApp imefunguliwa. Bonyeza SEND.', 'success');
}

function resetForm() {
    if (confirm('Weka upya fomu?')) {
        document.querySelectorAll('input, textarea, select').forEach(el => {
            if (el.type !== 'hidden') {
                if (el.type === 'date') el.value = '';
                else if (el.tagName === 'SELECT') el.selectedIndex = 0;
                else el.value = '';
            }
        });
        clearSignature();
        clearMessage();
        document.getElementById('signatureDate').valueAsDate = new Date();
        // restore self phone from URL
        const params = new URLSearchParams(window.location.search);
        const userParam = params.get('user');
        if (userParam) {
            try {
                const user = JSON.parse(decodeURIComponent(userParam));
                if (user.inchargePhone) document.getElementById('inchargeSelfPhone').value = user.inchargePhone;
            } catch(e) {}
        }
    }
}

console.log('✅ incharge.html loaded.');
</script>
</body>
</html>
