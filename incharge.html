

<!DOCTYPE html>
<html lang="sw">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Mganga Mfawidhi</title>
<style>
/* Stili zile zile za supervisor lakini rangi zambarau */
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#2c0a3e,#8e44ad);min-height:100vh;padding:20px;display:flex;justify-content:center;align-items:flex-start}
.form-container{background:#fff;border-radius:25px;padding:30px 25px;max-width:1100px;width:100%;box-shadow:0 25px 80px rgba(0,0,0,0.25);animation:slideUp .6s;margin-top:20px}@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
h2{color:#2c0a3e;text-align:center;font-size:26px;margin-bottom:4px}.subtitle{text-align:center;color:#7f8c8d;margin-bottom:20px;font-size:14px}
.section{background:#f8f9fa;border-radius:15px;padding:18px 20px;margin-bottom:18px;border-left:5px solid #8e44ad;transition:.3s}.section:hover{box-shadow:0 4px 15px rgba(0,0,0,0.08)}.section h3{color:#2c0a3e;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:17px}.section h3 .step{background:#8e44ad;color:#fff;border-radius:50%;width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}.section h3 .badge{background:#8e44ad;color:#fff;padding:2px 12px;border-radius:20px;font-size:11px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form-group{margin-bottom:4px}.form-group.full-width{grid-column:1/-1}.form-group label{display:block;font-weight:600;color:#2c0a3e;margin-bottom:4px;font-size:13px}.form-group label .required{color:#e74c3c;margin-left:4px}.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;transition:.3s;background:#fff}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#8e44ad;outline:none;box-shadow:0 0 0 3px rgba(142,68,173,0.15)}.form-group textarea{min-height:60px;resize:vertical}
.btn{padding:10px 18px;border:none;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:#8e44ad;color:#fff}.btn-primary:hover{background:#7d3c98;transform:translateY(-2px);box-shadow:0 4px 15px rgba(142,68,173,0.3)}.btn-secondary{background:#95a5a6;color:#fff}.btn-secondary:hover{background:#7f8c8d}.btn-danger{background:#e74c3c;color:#fff}.btn-danger:hover{background:#c0392b}.btn-info{background:#3498db;color:#fff}.btn-info:hover{background:#2e86c1}.btn-success{background:#27ae60;color:#fff}.btn-success:hover{background:#1e8449}.btn-warning{background:#f39c12;color:#fff}.btn-warning:hover{background:#d68910}.btn-purple{background:#8e44ad;color:#fff}.btn-purple:hover{background:#7d3c98}.btn-whatsapp{background:#25D366;color:#fff}.btn-whatsapp:hover{background:#1da851;transform:scale(1.05)}.btn-phone{background:#34B7F1;color:#fff}.btn-phone:hover{background:#1a9fd8}.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.button-group{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}.button-group .btn{flex:0 1 auto}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);max-width:450px;width:90%;background:#1a1a2e;color:#fff;padding:14px 20px;border-radius:14px;font-size:14px;text-align:center;z-index:999;opacity:0;transition:all .4s;pointer-events:none;box-shadow:0 8px 40px rgba(0,0,0,0.25)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:#27ae60}.toast.error{background:#e74c3c}.toast.info{background:#3498db}
.loading-spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #fff;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.status-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}.status-badge.saved{background:#d4edda;color:#155724}.status-badge.pending{background:#fff3cd;color:#856404}.status-badge.submitted{background:#cce5ff;color:#004085}.status-badge.reviewed{background:#d1ecf1;color:#0c5460}
.communication-bar{background:#f8f9fa;padding:10px 16px;border-radius:12px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;border:1px solid #e0e0e0}.communication-bar span{font-weight:600;color:#2c0a3e;margin-right:4px}
.data-tabs{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}.data-tabs .tab-btn{padding:6px 14px;border:none;border-radius:20px;cursor:pointer;font-size:13px;background:#ecf0f1;color:#7f8c8d;transition:.3s}.data-tabs .tab-btn.active{background:#8e44ad;color:#fff}.data-tabs .tab-btn:hover{background:#d5d8dc}
.data-container{background:#fff;border-radius:12px;padding:10px;border:1px solid #e0e0e0;max-height:280px;overflow-y:auto}.data-item{padding:8px 12px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}.data-item .badge-role{display:inline-block;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:600;margin-left:6px}.badge-role.worker{background:#27ae60;color:#fff}.badge-role.supervisor{background:#f39c12;color:#fff}.badge-role.incharge{background:#8e44ad;color:#fff}
.chart-container{background:#fff;border-radius:12px;padding:14px;border:1px solid #e0e0e0;margin-top:4px}.chart-bar{display:flex;align-items:center;gap:12px;margin:6px 0}.chart-bar .label{width:120px;font-size:13px;color:#2c0a3e;font-weight:500}.chart-bar .bar-track{flex:1;height:20px;background:#ecf0f1;border-radius:12px;overflow:hidden}.chart-bar .bar-fill{height:100%;border-radius:12px;background:linear-gradient(90deg,#8e44ad,#a569bd);transition:width .6s}.chart-bar .value{font-size:13px;font-weight:600;color:#2c0a3e;min-width:36px;text-align:right}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}.top-bar{flex-direction:column;align-items:stretch;text-align:center}.top-bar h2{font-size:22px}.button-group .btn{flex:1}.section{padding:14px}}
@media print{.no-print{display:none!important}.form-container{box-shadow:none!important}body{background:#fff!important}.section{break-inside:avoid}}
</style></head>
<body>
<div id="toast" class="toast"></div>
<div class="form-container">
  <div class="top-bar no-print"><h2 style="margin:0;">🏥 Mganga Mfawidhi</h2><div><button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Nyumbani</button><button class="btn btn-info" onclick="window.print()">🖨️ Chapisha</button><button class="btn btn-warning" onclick="window.print()">📄 PDF</button></div></div>
  <p class="subtitle" id="userGreeting">Karibu mganga mfawidhi</p>
  <div class="communication-bar no-print"><span>📞 Mawasiliano:</span><a href="tel:+255742710697" class="btn btn-phone" style="text-decoration:none;padding:4px 12px;font-size:13px;">📱 Simu</a><a href="https://wa.me/255742710697?text=Nimekamilisha%20tathmini%20yangu%20ya%20MTWARA%20PERFORMANCE.%20Tafadhali%20iangalie." target="_blank" class="btn btn-whatsapp" style="text-decoration:none;padding:4px 12px;font-size:13px;">💬 WhatsApp</a><span style="font-size:12px;color:#7f8c8d;margin-left:4px;">(+255742710697)</span></div>

  <!-- Sehemu 1: Taarifa -->
  <div class="section"><h3><span class="step">1</span> Taarifa zako</h3><div class="form-grid"><div class="form-group"><label>Jina <span class="required">*</span></label><input type="text" id="fullname" placeholder="Dr. Mwinyi"></div><div class="form-group"><label>Idara <span class="required">*</span></label><input type="text" id="department" placeholder="Idara ya Afya"></div><div class="form-group"><label>Cheo <span class="required">*</span></label><input type="text" id="position" placeholder="Mganga Mfawidhi"></div><div class="form-group"><label>Simu</label><input type="tel" id="phone" placeholder="0712345678"></div><div class="form-group full-width"><label>Barua Pepe</label><input type="email" id="email" placeholder="mwinyi@mtwara.go.tz"></div></div></div>

  <!-- Sehemu 2: Tathmini -->
  <div class="section"><h3><span class="step">2</span> Tathmini yako</h3><div class="form-grid"><div class="form-group"><label>Uongozi Kliniki (1-5)</label><input type="number" id="step1_leadership" min="1" max="5" placeholder="4"></div><div class="form-group"><label>Ubora Huduma (1-5)</label><input type="number" id="step2_quality" min="1" max="5" placeholder="5"></div><div class="form-group"><label>Uwajibikaji (1-5)</label><input type="number" id="step3_accountability" min="1" max="5" placeholder="4"></div><div class="form-group full-width"><label>Maelezo</label><textarea id="step_notes" placeholder="Maelezo ya tathmini..."></textarea></div></div></div>

  <!-- Sehemu 3: Maoni -->
  <div class="section"><h3><span class="step">3</span> Maoni</h3><div class="form-group"><label>Nguvu</label><textarea id="strengths" placeholder="Nguvu zako..."></textarea></div><div class="form-group"><label>Kuboresha</label><textarea id="weaknesses" placeholder="Maeneo ya kuboresha..."></textarea></div><div class="form-group"><label>Mapendekezo</label><textarea id="recommendations" placeholder="Mapendekezo..."></textarea></div><div class="form-group"><label>Jumla</label><textarea id="overall_comments" rows="2" placeholder="Maoni ya jumla..."></textarea></div></div>

  <!-- Sehemu 4: Grafu -->
  <div class="section"><h3><span class="step">4</span> 📊 Muhtasari</h3><div class="chart-container"><div class="chart-bar"><span class="label">Uongozi Kliniki</span><div class="bar-track"><div class="bar-fill" id="chartLead" style="width:0%;"></div></div><span class="value" id="valLead">0/5</span></div><div class="chart-bar"><span class="label">Ubora Huduma</span><div class="bar-track"><div class="bar-fill" id="chartQual" style="width:0%;"></div></div><span class="value" id="valQual">0/5</span></div><div class="chart-bar"><span class="label">Uwajibikaji</span><div class="bar-track"><div class="bar-fill" id="chartAcc" style="width:0%;"></div></div><span class="value" id="valAcc">0/5</span></div></div></div>

  <!-- Sehemu 5: Tathmini zilizotumwa -->
  <div class="section"><h3><span class="step">5</span> 📋 Tathmini Zilizotumwa</h3><div class="data-tabs"><button class="tab-btn active" onclick="loadAllData('all')">📋 Zote</button><button class="tab-btn" onclick="loadAllData('worker')">👤 Mtendakazi</button><button class="tab-btn" onclick="loadAllData('supervisor')">👔 Msimamizi</button><button class="tab-btn" onclick="loadAllData('incharge')">🏥 Yangu</button></div><div id="allDataContainer" class="data-container"><p style="color:#7f8c8d;text-align:center;">Bonyeza kituo cha juu</p></div></div>

  <!-- Vitufe -->
  <div class="button-group no-print"><button class="btn btn-success" onclick="saveAppraisal()" id="saveBtn">💾 Hifadhi</button><button class="btn btn-info" onclick="submitAppraisal()" id="submitBtn">📤 Tuma</button><button class="btn btn-secondary" onclick="loadAppraisal()">📂 Pakia</button><button class="btn btn-primary" onclick="showOverall()">📊 Jumla</button><button class="btn btn-purple" onclick="showSpecific()">🎯 Maalumu</button><button class="btn btn-danger" onclick="logout()">🚪 Toka</button></div>
  <div style="text-align:center;margin-top:12px;"><span id="saveStatus" class="status-badge pending">📝 Hajahifadhiwa</span></div>
</div>

<script>
const API_KEY="$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K",BIN_ID="6a4b0bc9da38895dfe32cc08";
function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.classList.remove('show'),3500)}
function getUsername(){const p=new URLSearchParams(window.location.search).get('user');if(!p)return null;try{return JSON.parse(decodeURIComponent(p)).username}catch(e){return null}}
const username=getUsername();if(!username){showToast('❌ Hakuna mtumiaji','error');setTimeout(()=>window.location.href='index.html',2000)}document.getElementById('userGreeting').textContent=`Karibu ${username}`;
function getFormData(){return{username,role:'incharge',fullname:document.getElementById('fullname').value,department:document.getElementById('department').value,position:document.getElementById('position').value,phone:document.getElementById('phone').value,email:document.getElementById('email').value,step1_leadership:+document.getElementById('step1_leadership').value||0,step2_quality:+document.getElementById('step2_quality').value||0,step3_accountability:+document.getElementById('step3_accountability').value||0,step_notes:document.getElementById('step_notes').value,strengths:document.getElementById('strengths').value,weaknesses:document.getElementById('weaknesses').value,recommendations:document.getElementById('recommendations').value,overall_comments:document.getElementById('overall_comments').value,status:'saved',submitted_to:null,timestamp:new Date().toISOString()}}
function setFormData(d){['fullname','department','position','phone','email','step1_leadership','step2_quality','step3_accountability','step_notes','strengths','weaknesses','recommendations','overall_comments'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=d[id]||''});updateStatus(d.status||'saved');updateChart()}
function updateStatus(s){const map={'saved':['saved','💾 Imehifadhiwa'],'submitted':['submitted','📤 Imetumwa'],'reviewed':['reviewed','✅ Imeidhinishwa'],'pending':['pending','📝 Hajahifadhiwa']};const c=map[s]||map.pending;const b=document.getElementById('saveStatus');b.className='status-badge '+c[0];b.textContent=c[1]}
function updateChart(){const l=+document.getElementById('step1_leadership').value||0,q=+document.getElementById('step2_quality').value||0,a=+document.getElementById('step3_accountability').value||0;document.getElementById('chartLead').style.width=(Math.min(l,5)/5*100)+'%';document.getElementById('valLead').textContent=l+'/5';document.getElementById('chartQual').style.width=(Math.min(q,5)/5*100)+'%';document.getElementById('valQual').textContent=q+'/5';document.getElementById('chartAcc').style.width=(Math.min(a,5)/5*100)+'%';document.getElementById('valAcc').textContent=a+'/5'}
document.querySelectorAll('input,textarea,select').forEach(el=>{el.addEventListener('input',updateChart);el.addEventListener('change',updateChart)});
async function saveAppraisal(){const b=document.getElementById('saveBtn');b.disabled=true;b.innerHTML='<span class="loading-spinner"></span> Inahifadhi...';const d=getFormData();d.status='saved';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json(),rec=res.record||{};if(!rec.appraisals)rec.appraisals={};if(!rec.appraisals.incharge)rec.appraisals.incharge={};rec.appraisals.incharge[username]=d;const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kuhifadhi');showToast('✅ Imehifadhiwa!','success');updateStatus('saved')}catch(e){showToast('❌ '+e.message,'error')}b.disabled=false;b.innerHTML='💾 Hifadhi'}
async function submitAppraisal(){const b=document.getElementById('submitBtn');b.disabled=true;b.innerHTML='<span class="loading-spinner"></span> Inatuma...';const d=getFormData();if(!d.fullname||!d.department||!d.position){showToast('❌ Jaza Jina, Idara na Cheo','error');b.disabled=false;b.innerHTML='📤 Tuma';return}d.status='submitted';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json(),rec=res.record||{};if(!rec.appraisals)rec.appraisals={};if(!rec.appraisals.incharge)rec.appraisals.incharge={};rec.appraisals.incharge[username]=d;const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kutuma');showToast('✅ Imetumwa!','success');updateStatus('submitted')}catch(e){showToast('❌ '+e.message,'error')}b.disabled=false;b.innerHTML='📤 Tuma'}
async function loadAppraisal(){try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json(),rec=res.record||{},d=rec.appraisals?.incharge?.[username];if(!d)return showToast('❌ Hakuna tathmini','error');setFormData(d);showToast('✅ Imepakiwa','success')}catch(e){showToast('❌ '+e.message,'error')}}
async function loadAllData(role='all'){const c=document.getElementById('allDataContainer');c.innerHTML='<span class="loading-spinner"></span> Inapakia...';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json(),rec=res.record||{},app=rec.appraisals||{};document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.tab-btn[onclick="loadAllData('${role}')"]`)?.classList.add('active');let html='',count=0;const roles=role==='all'?['worker','supervisor','incharge']:[role],labels={worker:'👤 Mtendakazi',supervisor:'👔 Msimamizi',incharge:'🏥 Mganga Mfawidhi'},badges={worker:'worker',supervisor:'supervisor',incharge:'incharge'};roles.forEach(r=>{const data=app[r]||{};Object.keys(data).forEach(u=>{const item=data[u];if(r!=='incharge'&&item.submitted_to!=='incharge'&&item.status!=='submitted')return;const icon=item.status==='submitted'?'📤':item.status==='reviewed'?'✅':'💾';html+=`<div class="data-item"><span><strong>${item.fullname||u}</strong><span class="badge-role ${badges[r]}">${labels[r]}</span></span><span style="font-size:12px;color:#7f8c8d;">${item.department||''} ${icon} ${item.status||'saved'}</span></div>`;count++})});c.innerHTML=count===0?'<p style="color:#7f8c8d;text-align:center;">Hakuna tathmini zilizotumwa.</p>':html}catch(e){c.innerHTML='<p style="color:#e74c3c;">Hitilafu: '+e.message+'</p>'}}
function showOverall(){const d=getFormData();alert(`📊 TATHMINI JUMLA\n\n👤 ${d.fullname||'Hajajazwa'}\n🏢 ${d.department||'Hajajazwa'}\n📋 ${d.position||'Hajajazwa'}\n⭐ Hatua 1: ${d.step1_leadership}\n⭐ Hatua 2: ${d.step2_quality}\n⭐ Hatua 3: ${d.step3_accountability}\n💬 Maoni: ${d.overall_comments||'Hakuna'}`)}
function showSpecific(){const d=getFormData();const avg=(+d.step1_leadership+ +d.step2_quality+ +d.step3_accountability)/3;alert(`🎯 TATHMINI MAALUMU\n\n📌 Uongozi: ${d.step1_leadership}/5\n📌 Ubora: ${d.step2_quality}/5\n📌 Uwajibikaji: ${d.step3_accountability}/5\n📊 Wastani: ${avg.toFixed(1)}/5\n📈 Kiwango: ${avg>=4?'🌟 Bora':avg>=3?'✅ Nzuri':avg>=2?'⚠️ Inahitajika Kuboresha':'❌ Dhaifu'}`)}
function logout(){window.location.href='index.html'}
window.onload=function(){loadAppraisal();loadAllData('all')};
</script>
</body>
</html>
