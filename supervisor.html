<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fomu ya Msimamizi</title>
    <style>
        /* Stili sawa na worker.html, lakini rangi tofauti */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a5276, #f39c12); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }
        .form-container { background: #fff; border-radius: 20px; padding: 40px 35px; max-width: 1000px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        h2 { color: #1a5276; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; font-size: 14px; }
        .section { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #f39c12; }
        .section h3 { color: #1a5276; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section h3 .badge { background: #f39c12; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 12px; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { display: block; font-weight: 600; color: #1a5276; margin-bottom: 4px; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #f39c12; outline: none; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 14px 30px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #f39c12; color: #fff; }
        .btn-primary:hover { background: #d68910; transform: translateY(-2px); }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .button-group { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); max-width: 400px; width: 90%; background: #1a1a2e; color: #fff; padding: 14px 22px; border-radius: 12px; font-size: 14px; text-align: center; z-index: 999; opacity: 0; transition: all 0.4s ease; pointer-events: none; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid #ecf0f1; border-top: 3px solid #f39c12; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .star-rating { display: flex; gap: 6px; align-items: center; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 28px; color: #ccc; cursor: pointer; transition: 0.2s; }
        .star-rating label:hover, .star-rating label.active { color: #f1c40f; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.saved { background: #d4edda; color: #155724; }
        .status-badge.pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="form-container">
    <h2>👔 Fomu ya Tathmini - Msimamizi</h2>
    <p class="subtitle" id="userGreeting">Karibu msimamizi</p>

    <!-- Section 1: KPI -->
    <div class="section">
        <h3>📊 KPI (Key Performance Indicators) <span class="badge">WHO Standard</span></h3>
        <div class="form-grid">
            <div class="form-group">
                <label>1. Uongozi na Usimamizi (Rating 1-5)</label>
                <input type="number" id="kpi_leadership" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group">
                <label>2. Ufanisi wa Timu (%)</label>
                <input type="number" id="kpi_team_efficiency" placeholder="Mfano: 80" min="0" max="100">
            </div>
            <div class="form-group">
                <label>3. Idadi ya Taarifa za Kila Mwezi</label>
                <input type="number" id="kpi_reports" placeholder="Mfano: 4">
            </div>
            <div class="form-group">
                <label>4. Kuridhika kwa Wafanyakazi (Rating 1-5)</label>
                <input type="number" id="kpi_staff_satisfaction" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group full-width">
                <label>5. Maelezo ya KPI</label>
                <textarea id="kpi_notes" placeholder="Andika maelezo..."></textarea>
            </div>
        </div>
    </div>

    <!-- Section 2: Strategic Goals -->
    <div class="section">
        <h3>🎯 Malengo ya Kimkakati (Strategic Goals)</h3>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>1. Malengo ya Idara</label>
                <textarea id="strategic_goals" placeholder="Andika malengo ya idara..."></textarea>
            </div>
            <div class="form-group">
                <label>2. Kiwango cha Mafanikio (%)</label>
                <input type="number" id="strategic_achievement" placeholder="Mfano: 75" min="0" max="100">
            </div>
            <div class="form-group">
                <label>3. Muda (miezi)</label>
                <input type="number" id="strategic_timeline" placeholder="Mfano: 8">
            </div>
        </div>
    </div>

    <!-- Section 3: Skills & Competencies -->
    <div class="section">
        <h3>🧠 Ujuzi na Kompetensi (Skills & Competencies)</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Ujuzi wa Usimamizi (1-5)</label>
                <input type="number" id="skill_management" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group">
                <label>Ujuzi wa Mipango (1-5)</label>
                <input type="number" id="skill_planning" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group">
                <label>Ujuzi wa Uwakilishi (1-5)</label>
                <input type="number" id="skill_representation" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group">
                <label>Ujuzi wa Ufuatiliaji (1-5)</label>
                <input type="number" id="skill_monitoring" placeholder="1-5" min="1" max="5">
            </div>
            <div class="form-group full-width">
                <label>Maelezo ya Ujuzi</label>
                <textarea id="skill_notes" placeholder="Eleza ujuzi wako..."></textarea>
            </div>
        </div>
    </div>

    <!-- Section 4: Training & Development -->
    <div class="section">
        <h3>📚 Mafunzo na Maendeleo (Training & Development)</h3>
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Mafunzo yaliyofuata</label>
                <textarea id="training_attended" placeholder="Orodhesha mafunzo..."></textarea>
            </div>
            <div class="form-group full-width">
                <label>Mafunzo yanayohitajika</label>
                <textarea id="training_needed" placeholder="Mapendekezo..."></textarea>
            </div>
            <div class="form-group">
                <label>Saa za Mafunzo</label>
                <input type="number" id="training_hours" placeholder="Mfano: 30">
            </div>
            <div class="form-group">
                <label>Tarehe ya Mwisho</label>
                <input type="date" id="training_last_date">
            </div>
        </div>
    </div>

    <!-- Section 5: Overall Comments -->
    <div class="section">
        <h3>💬 Maoni ya Jumla</h3>
        <div class="form-group">
            <textarea id="overall_comments" placeholder="Andika maoni ya jumla..." rows="3"></textarea>
        </div>
    </div>

    <div class="button-group">
        <button class="btn btn-primary" onclick="saveAppraisal()" id="saveBtn">💾 Hifadhi Tathmini</button>
        <button class="btn btn-secondary" onclick="loadAppraisal()">📂 Pakia Tathmini</button>
        <button class="btn btn-danger" onclick="logout()">🚪 Toka</button>
    </div>
    <div style="text-align: center; margin-top: 12px;">
        <span id="saveStatus" class="status-badge pending">Hajahifadhiwa</span>
    </div>
</div>

<script>
// Same as worker.js but with different field IDs
const API_KEY = "$2a$10$ZKtthmAuyPRRhOzmTuLwJerAsf4VoDot5L9hRGRQfa21/Mw/B0UcS";
const BIN_ID = "6a4b0bc9da38895dfe32cc08";

function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3500);
}

function getUsername() {
    const params = new URLSearchParams(window.location.search);
    const userData = params.get('user');
    if (!userData) return null;
    try {
        const parsed = JSON.parse(decodeURIComponent(userData));
        return parsed.username;
    } catch (e) { return null; }
}

const username = getUsername();
if (!username) {
    showToast('❌ Hitilafu: Hakuna mtumiaji', 'error');
    setTimeout(() => window.location.href = 'index.html', 2000);
}
document.getElementById('userGreeting').textContent = `Karibu ${username} - Tathmini ya Msimamizi`;

function getFormData() {
    return {
        username: username,
        kpi_leadership: document.getElementById('kpi_leadership').value || 0,
        kpi_team_efficiency: document.getElementById('kpi_team_efficiency').value || 0,
        kpi_reports: document.getElementById('kpi_reports').value || 0,
        kpi_staff_satisfaction: document.getElementById('kpi_staff_satisfaction').value || 0,
        kpi_notes: document.getElementById('kpi_notes').value,
        strategic_goals: document.getElementById('strategic_goals').value,
        strategic_achievement: document.getElementById('strategic_achievement').value || 0,
        strategic_timeline: document.getElementById('strategic_timeline').value || 0,
        skill_management: document.getElementById('skill_management').value || 0,
        skill_planning: document.getElementById('skill_planning').value || 0,
        skill_representation: document.getElementById('skill_representation').value || 0,
        skill_monitoring: document.getElementById('skill_monitoring').value || 0,
        skill_notes: document.getElementById('skill_notes').value,
        training_attended: document.getElementById('training_attended').value,
        training_needed: document.getElementById('training_needed').value,
        training_hours: document.getElementById('training_hours').value || 0,
        training_last_date: document.getElementById('training_last_date').value,
        overall_comments: document.getElementById('overall_comments').value,
        timestamp: new Date().toISOString()
    };
}

function setFormData(data) {
    document.getElementById('kpi_leadership').value = data.kpi_leadership || '';
    document.getElementById('kpi_team_efficiency').value = data.kpi_team_efficiency || '';
    document.getElementById('kpi_reports').value = data.kpi_reports || '';
    document.getElementById('kpi_staff_satisfaction').value = data.kpi_staff_satisfaction || '';
    document.getElementById('kpi_notes').value = data.kpi_notes || '';
    document.getElementById('strategic_goals').value = data.strategic_goals || '';
    document.getElementById('strategic_achievement').value = data.strategic_achievement || '';
    document.getElementById('strategic_timeline').value = data.strategic_timeline || '';
    document.getElementById('skill_management').value = data.skill_management || '';
    document.getElementById('skill_planning').value = data.skill_planning || '';
    document.getElementById('skill_representation').value = data.skill_representation || '';
    document.getElementById('skill_monitoring').value = data.skill_monitoring || '';
    document.getElementById('skill_notes').value = data.skill_notes || '';
    document.getElementById('training_attended').value = data.training_attended || '';
    document.getElementById('training_needed').value = data.training_needed || '';
    document.getElementById('training_hours').value = data.training_hours || '';
    document.getElementById('training_last_date').value = data.training_last_date || '';
    document.getElementById('overall_comments').value = data.overall_comments || '';
    document.getElementById('saveStatus').className = 'status-badge saved';
    document.getElementById('saveStatus').textContent = 'Imehifadhiwa: ' + new Date(data.timestamp).toLocaleString();
}

async function saveAppraisal() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Inahifadhi...';
    const data = getFormData();
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
        if (!res.ok) throw new Error('Network error');
        const result = await res.json();
        const record = result.record || {};
        if (!record.appraisals) record.appraisals = {};
        if (!record.appraisals.supervisor) record.appraisals.supervisor = {};
        record.appraisals.supervisor[username] = data;
        const update = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(record)
        });
        if (!update.ok) throw new Error('Imeshindwa kuhifadhi');
        showToast('✅ Tathmini imehifadhiwa!', 'success');
        document.getElementById('saveStatus').className = 'status-badge saved';
        document.getElementById('saveStatus').textContent = 'Imehifadhiwa: ' + new Date().toLocaleString();
    } catch (e) {
        showToast('❌ ' + e.message, 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '💾 Hifadhi Tathmini';
}

async function loadAppraisal() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
        if (!res.ok) throw new Error('Network error');
        const result = await res.json();
        const record = result.record || {};
        const data = record.appraisals?.supervisor?.[username];
        if (!data) return showToast('❌ Hakuna tathmini iliyohifadhiwa', 'error');
        setFormData(data);
        showToast('✅ Tathmini imepakiwa', 'success');
    } catch (e) {
        showToast('❌ ' + e.message, 'error');
    }
}

function logout() {
    window.location.href = 'index.html';
}

window.onload = loadAppraisal;
</script>
</body>
</html>
