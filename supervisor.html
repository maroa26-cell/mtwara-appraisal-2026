
<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile ya Msimamizi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a5276, #27ae60); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .profile-container { background: #fff; border-radius: 20px; padding: 40px 35px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        h2 { color: #1a5276; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; color: #1a5276; margin-bottom: 4px; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid #dee2e6; border-radius: 10px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #27ae60; outline: none; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: #27ae60; color: #fff; }
        .btn-primary:hover { background: #1e8449; transform: translateY(-2px); }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); max-width: 400px; width: 90%; background: #1a1a2e; color: #fff; padding: 14px 22px; border-radius: 12px; font-size: 14px; text-align: center; z-index: 999; opacity: 0; transition: all 0.4s ease; pointer-events: none; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid #ecf0f1; border-top: 3px solid #27ae60; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .profile-preview { background: #f8f9fa; padding: 16px; border-radius: 10px; margin-top: 16px; border-left: 4px solid #27ae60; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="profile-container">
    <h2>👔 Profile ya Msimamizi</h2>
    <p class="subtitle">Tafadhali jaza maelezo yako kabla ya kuanza tathmini</p>

    <div class="form-group">
        <label>Jina Kamili</label>
        <input type="text" id="fullname" placeholder="Mfano: Ali Juma">
    </div>
    <div class="form-group">
        <label>Idara</label>
        <input type="text" id="department" placeholder="Mfano: Wodi ya Wanaume">
    </div>
    <div class="form-group">
        <label>Cheo / Wadhifa</label>
        <input type="text" id="position" placeholder="Mfano: Msimamizi wa Wodi">
    </div>
    <div class="form-group">
        <label>Nambari ya Simu</label>
        <input type="tel" id="phone" placeholder="Mfano: 0712345678">
    </div>
    <div class="form-group">
        <label>Barua Pepe</label>
        <input type="email" id="email" placeholder="Mfano: ali@mtwara.go.tz">
    </div>
    <div class="form-group">
        <label>Uzoefu (miaka)</label>
        <input type="number" id="experience" placeholder="Mfano: 5">
    </div>

    <button class="btn btn-primary" onclick="saveProfile()" id="saveBtn">💾 Hifadhi Profile na Endelea</button>
    <button class="btn btn-secondary" onclick="logout()" style="margin-top: 8px;">🚪 Toka</button>

    <div id="profilePreview" class="profile-preview" style="display:none;">
        <strong>✅ Profile imehifadhiwa:</strong>
        <p id="previewText"></p>
    </div>
</div>

<script>
const API_KEY = "$2a$10$ZKtthmAuyPRRhOzmTuLwJerAsf4VoDot5L9hRGRQfa21/Mw/B0UcS";
const BIN_ID = "6a4b0bc9da38895dfe32cc08";

function showToast(msg, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3500);
}

// Get username from URL
function getUsername() {
    const params = new URLSearchParams(window.location.search);
    const userData = params.get('user');
    if (!userData) return null;
    try {
        const parsed = JSON.parse(decodeURIComponent(userData));
        return parsed.username;
    } catch (e) { return null; }
}

const username = getUsername();
if (!username) {
    showToast('❌ Hitilafu: Hakuna mtumiaji aliyebainishwa', 'error');
    setTimeout(() => window.location.href = 'index.html', 2000);
}

// Load existing profile if any
async function loadProfile() {
    try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        const profiles = data.record?.supervisor_profiles || {};
        const profile = profiles[username] || {};
        if (profile.fullname) {
            document.getElementById('fullname').value = profile.fullname || '';
            document.getElementById('department').value = profile.department || '';
            document.getElementById('position').value = profile.position || '';
            document.getElementById('phone').value = profile.phone || '';
            document.getElementById('email').value = profile.email || '';
            document.getElementById('experience').value = profile.experience || '';
            // Show preview
            document.getElementById('profilePreview').style.display = 'block';
            document.getElementById('previewText').innerHTML = `
                <strong>${profile.fullname}</strong> | ${profile.department} | ${profile.position}
            `;
        }
    } catch (e) { console.error(e); }
}

async function saveProfile() {
    const fullname = document.getElementById('fullname').value.trim();
    const department = document.getElementById('department').value.trim();
    const position = document.getElementById('position').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const experience = document.getElementById('experience').value.trim();

    if (!fullname || !department || !position) {
        return showToast('❌ Tafadhali jaza sehemu muhimu (Jina, Idara, Cheo)', 'error');
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Inahifadhi...';

    try {
        // Get current data
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        const record = data.record || {};
        if (!record.supervisor_profiles) record.supervisor_profiles = {};

        // Save profile
        record.supervisor_profiles[username] = {
            fullname, department, position, phone, email, experience,
            updatedAt: new Date().toISOString()
        };

        const update = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(record)
        });
        if (!update.ok) throw new Error('Imeshindwa kuhifadhi');

        showToast('✅ Profile imehifadhiwa! Unaendelea na tathmini...', 'success');
        document.getElementById('profilePreview').style.display = 'block';
        document.getElementById('previewText').innerHTML = `
            <strong>${fullname}</strong> | ${department} | ${position}
        `;

        // Redirect to supervisor dashboard after short delay
        setTimeout(() => {
            const userData = encodeURIComponent(JSON.stringify({ username, role: 'supervisor' }));
            window.location.href = `supervisor_dashboard.html?user=${userData}`;
        }, 1500);

    } catch (e) {
        showToast('❌ ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '💾 Hifadhi Profile na Endelea';
    }
}

function logout() {
    window.location.href = 'index.html';
}

window.onload = function() {
    loadProfile();
    console.log('✅ Supervisor Profile Page loaded');
};
</script>
</body>
</html>
