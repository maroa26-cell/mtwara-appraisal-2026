
<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Msimamizi - Tathmini</title>
  <style>
    /* Stili zile zile za worker lakini rangi dhahabu */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', Tahoma, sans-serif; background:linear-gradient(135deg,#4a2f0a,#f39c12); min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:flex-start; }
    .container { background:#fff; border-radius:28px; padding:35px 30px; max-width:1100px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.2); margin-top:20px; }
    h2 { color:#4a2f0a; text-align:center; font-size:28px; margin-bottom:6px; }
    .sub { text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:25px; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
    .top-bar .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:8px 18px; border:none; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; transition:0.3s; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
    .btn-primary { background:#f39c12; color:#fff; }
    .btn-primary:hover { background:#d68910; transform:translateY(-2px); box-shadow:0 4px 15px rgba(243,156,18,0.3); }
    .btn-secondary { background:#95a5a6; color:#fff; }
    .btn-secondary:hover { background:#7f8c8d; }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-danger:hover { background:#c0392b; }
    .btn-info { background:#3498db; color:#fff; }
    .btn-info:hover { background:#2e86c1; }
    .btn-warning { background:#f39c12; color:#fff; }
    .btn-warning:hover { background:#d68910; }
    .btn-purple { background:#8e44ad; color:#fff; }
    .btn-purple:hover { background:#7d3c98; }
    .btn-whatsapp { background:#25D366; color:#fff; }
    .btn-whatsapp:hover { background:#1da851; }
    .btn-phone { background:#34B7F1; color:#fff; }
    .btn-phone:hover { background:#1a9fd8; }
    .section { background:#f8f9fa; border-radius:16px; padding:20px 22px; margin-bottom:20px; border-left:5px solid #f39c12; }
    .section h3 { color:#4a2f0a; font-size:18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
    .section h3 .step { background:#f39c12; color:#fff; border-radius:50%; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:6px; }
    .form-group.full { grid-column:1/-1; }
    .form-group label { display:block; font-weight:600; color:#4a2f0a; margin-bottom:4px; font-size:13px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px 14px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; transition:0.3s; background:#fff; }
    .form-group input:focus, .form-group textarea:focus { border-color:#f39c12; outline:none; box-shadow:0 0 0 3px rgba(243,156,18,0.15); }
    .form-group textarea { min-height:70px; resize:vertical; }
    .comms { background:#f8f9fa; padding:12px 18px; border-radius:12px; display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:20px; border:1px solid #e0e0e0; }
    .comms span { font-weight:600; color:#4a2f0a; }
    .status-badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600; }
    .status-badge.saved { background:#d4edda; color:#155724; }
    .status-badge.pending { background:#fff3cd; color:#856404; }
    .status-badge.submitted { background:#cce5ff; color:#004085; }
    .button-group { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:20px; }
    .button-group .btn { padding:12px 24px; font-size:14px; }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); max-width:450px; width:90%; padding:14px 22px; border-radius:14px; color:#fff; text-align:center; z-index:999; opacity:0; transition:0.4s; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#27ae60; }
    .toast.error { background:#e74c3c; }
    .toast.info { background:#3498db; }
    .loading { display:inline-block; width:16px; height:16px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .worker-list { background:#fff; border-radius:12px; padding:10px; border:1px solid #e0e0e0; max-height:200px; overflow-y:auto; }
    .worker-list-item { padding:8px 12px; border-bottom:1px solid #eee; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .worker-list-item:hover { background:#fef9e7; }
    .worker-list-item .badge { background:#f39c12; color:#fff; padding:2px 10px; border-radius:12px; font-size:11px; }
    @media(max-width:768px){ .form-grid { grid-template-columns:1fr; } .top-bar { flex-direction:column; align-items:stretch; } .button-group .btn { flex:1; } }
    @media print { .no-print { display:none !important; } .container { box-shadow:none !important; } body { background:#fff !important; } }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar no-print">
    <h2 style="margin:0;">👔 Msimamizi</h2>
    <div class="btn-group">
      <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Nyumbani</button>
      <button class="btn btn-info" onclick="window.print()">🖨️ Chapisha</button>
      <button class="btn btn-warning" onclick="exportPDF()">📄 PDF</button>
    </div>
  </div>
  <div class="sub" id="greeting">Karibu msimamizi</div>

  <!-- Mawasiliano -->
  <div class="comms no-print">
    <span>📞 Mawasiliano:</span>
    <a href="tel:+255742710697" class="btn btn-phone" style="padding:4px 14px;font-size:13px;">📱 Simu</a>
    <a href="#" onclick="sendWhatsApp()" class="btn btn-whatsapp" style="padding:4px 14px;font-size:13px;">💬 WhatsApp</a>
    <span style="font-size:13px;color:#7f8c8d;margin-left:auto;" id="submissionStatus">📤 Hujatumwa</span>
  </div>

  <!-- SEHEMU A: Taarifa za Msimamizi (Kujitathmini) - BILA KPI -->
  <div class="section">
    <h3><span class="step">A</span> Taarifa zako (Msimamizi)</h3>
    <div class="form-grid">
      <div class="form-group"><label>Jina <span style="color:#e74c3c;">*</span></label><input type="text" id="sup_fullname" placeholder="Fatma Hassan"></div>
      <div class="form-group"><label>Idara <span style="color:#e74c3c;">*</span></label><input type="text" id="sup_department" placeholder="Idara ya Wodi"></div>
      <div class="form-group"><label>Cheo <span style="color:#e74c3c;">*</span></label><input type="text" id="sup_position" placeholder="Msimamizi Mkuu"></div>
      <div class="form-group"><label>Simu</label><input type="tel" id="sup_phone" placeholder="0712345678"></div>
      <div class="form-group full"><label>Barua Pepe</label><input type="email" id="sup_email" placeholder="fatma@mtwara.go.tz"></div>
    </div>
    <!-- Tathmini ya msimamizi mwenyewe - bila KPI -->
    <div class="form-grid" style="margin-top:16px;">
      <div class="form-group full"><label>Maelezo ya Tathmini yako</label><textarea id="sup_self_eval" placeholder="Eleza tathmini yako kwa ufupi..."></textarea></div>
      <div class="form-group"><label>Nguvu zako</label><textarea id="sup_strengths" placeholder="Nguvu zako..."></textarea></div>
      <div class="form-group"><label>Maeneo ya Kuboresha</label><textarea id="sup_weaknesses" placeholder="Maeneo ya kuboresha..."></textarea></div>
      <div class="form-group full"><label>Mapendekezo yako</label><textarea id="sup_recommendations" placeholder="Mapendekezo..."></textarea></div>
    </div>
  </div>

  <!-- SEHEMU B: Taarifa za Mtendakazi (Kumtathmini) - BILA KPI -->
  <div class="section">
    <h3><span class="step">B</span> Tathmini ya Mtendakazi</h3>
    <p style="font-size:14px;color:#7f8c8d;margin-bottom:12px;">Jaza taarifa za mtendakazi unayemtathmini</p>
    <div class="form-grid">
      <div class="form-group"><label>Jina la Mtendakazi <span style="color:#e74c3c;">*</span></label><input type="text" id="worker_fullname" placeholder="Ali Juma"></div>
      <div class="form-group"><label>Idara ya Mtendakazi</label><input type="text" id="worker_department" placeholder="Wodi ya Wanaume"></div>
      <div class="form-group"><label>Cheo cha Mtendakazi</label><input type="text" id="worker_position" placeholder="Muuguzi"></div>
      <div class="form-group"><label>Simu ya Mtendakazi</label><input type="tel" id="worker_phone" placeholder="0712345678"></div>
    </div>
    <!-- Tathmini ya mtendakazi - bila KPI -->
    <div class="form-grid" style="margin-top:16px;">
      <div class="form-group full"><label>Maelezo ya Tathmini ya Mtendakazi</label><textarea id="worker_eval_notes" placeholder="Eleza tathmini ya mtendakazi..."></textarea></div>
      <div class="form-group"><label>Nguvu za Mtendakazi</label><textarea id="worker_strengths" placeholder="Nguvu za mtendakazi..."></textarea></div>
      <div class="form-group"><label>Maeneo ya Kuboresha (Mtendakazi)</label><textarea id="worker_weaknesses" placeholder="Maeneo ya kuboresha..."></textarea></div>
      <div class="form-group full"><label>Mapendekezo kwa Mtendakazi</label><textarea id="worker_recommendations" placeholder="Mapendekezo..."></textarea></div>
      <div class="form-group full"><label>Maoni ya Jumla (Mtendakazi)</label><textarea id="worker_overall" rows="2" placeholder="Maoni ya jumla..."></textarea></div>
    </div>
  </div>

  <!-- Orodha ya Wafanyakazi -->
  <div class="section">
    <h3><span class="step">C</span> Wafanyakazi Waliotuma Tathmini</h3>
    <button class="btn btn-info" onclick="loadWorkerList()" style="margin-bottom:10px;">📋 Tazama Orodha</button>
    <div id="workerListContainer" class="worker-list"><p style="color:#7f8c8d;text-align:center;">Bonyeza kitufe hapo juu</p></div>
  </div>

  <!-- Vitufe -->
  <div class="button-group no-print">
    <button class="btn btn-primary" onclick="saveAppraisal()" id="saveBtn">💾 Hifadhi</button>
    <button class="btn btn-info" onclick="submitToIncharge()" id="submitBtn">📤 Tuma kwa Mganga</button>
    <button class="btn btn-secondary" onclick="loadAppraisal()">📂 Pakia</button>
    <button class="btn btn-danger" onclick="deleteAppraisal()">🗑️ Futa</button>
    <button class="btn btn-success" onclick="showOverall()">📊 Jumla</button>
    <button class="btn btn-purple" onclick="showSpecific()">🎯 Maalumu</button>
    <button class="btn btn-danger" onclick="logout()">🚪 Toka</button>
  </div>
  <div style="text-align:center;margin-top:12px;"><span id="saveStatus" class="status-badge pending">📝 Hajahifadhiwa</span></div>
</div>

<script>
// ========================= CONFIG =========================
const API_KEY="$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K", BIN_ID="6a4b0bc9da38895dfe32cc08";
function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.classList.remove('show'),3500)}
function getUsername(){const p=new URLSearchParams(window.location.search).get('user');if(!p)return null;try{return JSON.parse(decodeURIComponent(p)).username}catch(e){return null}}
const username=getUsername();if(!username){showToast('❌ Hakuna mtumiaji','error');setTimeout(()=>window.location.href='index.html',2000)}
document.getElementById('greeting').textContent=`Karibu ${username} - Jaza tathmini yako na ya mtendakazi`;

// ========================= WHATSAPP =========================
function sendWhatsApp(){const d=getFormData();const msg=`Nimekamilisha tathmini yangu ya MTWARA PERFORMANCE.%0A%0A👤 Msimamizi: ${d.sup_fullname}%0A👤 Mtendakazi: ${d.worker_fullname}%0A📋 Majukumu Jumla: ${d.general_duties}%0A🎯 Majukumu Maalumu: ${d.specific_duties}%0A💬 Maoni: ${d.overall_comments||'Hakuna'}%0A%0ATafadhali iangalie.`;window.open(`https://wa.me/255742710697?text=${msg}`,'_blank')}

// ========================= GET/SET DATA =========================
function getFormData(){return{
  username, role:'supervisor',
  sup_fullname:document.getElementById('sup_fullname').value,
  sup_department:document.getElementById('sup_department').value,
  sup_position:document.getElementById('sup_position').value,
  sup_phone:document.getElementById('sup_phone').value,
  sup_email:document.getElementById('sup_email').value,
  sup_self_eval:document.getElementById('sup_self_eval').value,
  sup_strengths:document.getElementById('sup_strengths').value,
  sup_weaknesses:document.getElementById('sup_weaknesses').value,
  sup_recommendations:document.getElementById('sup_recommendations').value,
  worker_fullname:document.getElementById('worker_fullname').value,
  worker_department:document.getElementById('worker_department').value,
  worker_position:document.getElementById('worker_position').value,
  worker_phone:document.getElementById('worker_phone').value,
  worker_eval_notes:document.getElementById('worker_eval_notes').value,
  worker_strengths:document.getElementById('worker_strengths').value,
  worker_weaknesses:document.getElementById('worker_weaknesses').value,
  worker_recommendations:document.getElementById('worker_recommendations').value,
  worker_overall:document.getElementById('worker_overall').value,
  status:'saved', submitted_to:null, timestamp:new Date().toISOString()
}}
function setFormData(d){['sup_fullname','sup_department','sup_position','sup_phone','sup_email','sup_self_eval','sup_strengths','sup_weaknesses','sup_recommendations','worker_fullname','worker_department','worker_position','worker_phone','worker_eval_notes','worker_strengths','worker_weaknesses','worker_recommendations','worker_overall'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=d[id]||''});updateStatus(d.status||'saved');updateSubmissionStatus(d.submitted_to||null)}
function updateStatus(s){const map={'saved':['saved','💾 Imehifadhiwa'],'submitted':['submitted','📤 Imetumwa'],'reviewed':['reviewed','📋 Inakaguliwa'],'approved':['approved','✅ Imeidhinishwa'],'pending':['pending','📝 Hajahifadhiwa']};const c=map[s]||map.pending;const b=document.getElementById('saveStatus');b.className='status-badge '+c[0];b.textContent=c[1]}
function updateSubmissionStatus(s){const el=document.getElementById('submissionStatus');if(s==='incharge'){el.innerHTML='✅ Imetumwa';el.style.color='#27ae60'}else{el.innerHTML='📤 Hujatumwa';el.style.color='#7f8c8d'}}

// ========================= SAVE =========================
async function saveAppraisal(){const b=document.getElementById('saveBtn');b.disabled=true;b.innerHTML='<span class="loading"></span> Inahifadhi...';const d=getFormData();d.status='saved';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json();if(!res.record)res.record={};const rec=res.record;if(!rec.appraisals)rec.appraisals={};if(!rec.appraisals.supervisor)rec.appraisals.supervisor={};rec.appraisals.supervisor[username]=d;const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kuhifadhi');showToast('✅ Imehifadhiwa!','success');updateStatus('saved')}catch(e){showToast('❌ '+e.message,'error');console.error(e)}b.disabled=false;b.innerHTML='💾 Hifadhi'}

// ========================= SUBMIT =========================
async function submitToIncharge(){const b=document.getElementById('submitBtn');b.disabled=true;b.innerHTML='<span class="loading"></span> Inatuma...';const d=getFormData();if(!d.sup_fullname||!d.worker_fullname){showToast('❌ Jaza Jina lako na la Mtendakazi','error');b.disabled=false;b.innerHTML='📤 Tuma';return}d.status='submitted';d.submitted_to='incharge';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json();if(!res.record)res.record={};const rec=res.record;if(!rec.appraisals)rec.appraisals={};if(!rec.appraisals.supervisor)rec.appraisals.supervisor={};rec.appraisals.supervisor[username]=d;const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kutuma');showToast('✅ Imetumwa!','success');updateStatus('submitted');updateSubmissionStatus('incharge')}catch(e){showToast('❌ '+e.message,'error');console.error(e)}b.disabled=false;b.innerHTML='📤 Tuma'}

// ========================= LOAD =========================
async function loadAppraisal(){try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json();const rec=res.record||{};const d=rec.appraisals?.supervisor?.[username];if(!d)return showToast('❌ Hakuna tathmini','error');setFormData(d);showToast('✅ Imepakiwa','success')}catch(e){showToast('❌ '+e.message,'error')}}

// ========================= DELETE =========================
async function deleteAppraisal(){if(!confirm('Je, una uhakika unataka kufuta tathmini hii?'))return;try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json();const rec=res.record||{};if(rec.appraisals?.supervisor?.[username]){delete rec.appraisals.supervisor[username];const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kufuta');showToast('✅ Imehifadhiwa','success');updateStatus('pending');updateSubmissionStatus(null)}else{showToast('❌ Hakuna tathmini ya kufuta','error')}}catch(e){showToast('❌ '+e.message,'error')}}

// ========================= OVERALL / SPECIFIC =========================
function showOverall(){const d=getFormData();alert(`📊 TATHMINI JUMLA\n\n👔 Msimamizi: ${d.sup_fullname||'Hajajazwa'}\n👤 Mtendakazi: ${d.worker_fullname||'Hajajazwa'}\n📋 Majukumu Jumla: ${d.general_duties||'Hakuna'}\n🎯 Majukumu Maalumu: ${d.specific_duties||'Hakuna'}\n💬 Maoni: ${d.overall_comments||'Hakuna'}`)}
function showSpecific(){alert('🎯 Tathmini Maalumu - Angalia maelezo kwenye fomu.')}

// ========================= WORKER LIST =========================
async function loadWorkerList(){const c=document.getElementById('workerListContainer');c.innerHTML='<span class="loading"></span> Inapakia...';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const res=await r.json();const rec=res.record||{};const workers=rec.appraisals?.worker||{};const us=Object.keys(workers);if(us.length===0){c.innerHTML='<p style="color:#7f8c8d;">Hakuna wafanyakazi.</p>';return}let html='';us.forEach(w=>{const d=workers[w];html+=`<div class="worker-list-item"><span><strong>${d.fullname||w}</strong> <span class="badge">${d.department||'Idara'}</span></span><span style="font-size:12px;color:#7f8c8d;">${d.status||'saved'}</span></div>`});c.innerHTML=html}catch(e){c.innerHTML='<p style="color:#e74c3c;">Hitilafu: '+e.message+'</p>'}}

// ========================= PDF =========================
function exportPDF(){const d=getFormData();const {jsPDF}=window.jspdf;const doc=new jsPDF('p','mm','a4');doc.setFontSize(16);doc.text('TATHMINI YA MSIMAMIZI',20,20);doc.setFontSize(12);doc.text(`Msimamizi: ${d.sup_fullname||'Hajajazwa'}`,20,35);doc.text(`Mtendakazi: ${d.worker_fullname||'Hajajazwa'}`,20,45);doc.text(`Tathmini ya Mtendakazi: ${d.worker_eval_notes||'Hakuna'}`,20,60);doc.text(`Maoni: ${d.worker_overall||'Hakuna'}`,20,75);doc.text(`Imetolewa: ${new Date().toLocaleString()}`,20,260);doc.save(`tathmini_msimamizi_${username}.pdf`);showToast('✅ PDF imehifadhiwa','success')}

// ========================= LOGOUT =========================
function logout(){window.location.href='index.html'}
window.onload=loadAppraisal;
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
