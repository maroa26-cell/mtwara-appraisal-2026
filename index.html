
<!DOCTYPE html>
<html lang="sw">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MTWARA - Ingia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a5276,#8e44ad);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.login-container{background:#fff;border-radius:20px;padding:40px 35px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp .6s}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.login-header{text-align:center;margin-bottom:20px}.login-header .logo{font-size:48px}.login-header h1{color:#1a5276;font-size:24px}.login-header p{color:#7f8c8d;font-size:14px}.login-header .badge{display:inline-block;background:#8e44ad;color:#fff;padding:4px 16px;border-radius:20px;font-size:11px;margin-top:6px}
.form-group{margin-bottom:14px}.form-group label{display:block;font-weight:600;color:#1a5276;margin-bottom:4px;font-size:13px}.form-group input,.form-group select{width:100%;padding:12px 16px;border:2px solid #dee2e6;border-radius:10px;font-size:14px;transition:.3s}.form-group input:focus{border-color:#8e44ad;outline:none;box-shadow:0 0 0 3px rgba(142,68,173,0.15)}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;transition:.3s}.btn-primary{background:#8e44ad;color:#fff}.btn-primary:hover{background:#7d3c98;transform:translateY(-2px);box-shadow:0 4px 15px rgba(142,68,173,0.3)}.btn-secondary{background:#3498db;color:#fff}.btn-secondary:hover{background:#2e86c1}.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.tab-buttons{display:flex;gap:8px;margin-bottom:20px}.tab-buttons .btn{flex:1;padding:10px;font-size:14px;border-radius:10px}.tab-buttons .btn.active{background:#8e44ad;color:#fff}.tab-buttons .btn.inactive{background:#ecf0f1;color:#7f8c8d}.tab-content{display:none}.tab-content.active{display:block}
.password-wrapper{position:relative}.password-wrapper input{padding-right:50px}.toggle-password{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:0;border:none;font-size:18px;cursor:pointer;color:#7f8c8d}
.checkbox-group{display:flex;align-items:center;gap:10px;margin:8px 0}.checkbox-group input[type="checkbox"]{width:18px;height:18px;accent-color:#8e44ad;cursor:pointer}
.divider{text-align:center;margin:16px 0;color:#bdc3c7;font-size:12px;position:relative}.divider::before,.divider::after{content:'';position:absolute;top:50%;width:45%;height:1px;background:#ecf0f1}.divider::before{left:0}.divider::after{right:0}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);max-width:450px;width:90%;background:#1a1a2e;color:#fff;padding:14px 22px;border-radius:14px;font-size:14px;text-align:center;z-index:999;opacity:0;transition:all .4s;pointer-events:none;box-shadow:0 8px 40px rgba(0,0,0,0.25)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:#27ae60}.toast.error{background:#e74c3c}.toast.info{background:#3498db}
.connection-status{text-align:center;font-size:12px;color:#7f8c8d;margin-bottom:16px;padding:8px;background:#f8f9fa;border-radius:8px}
.loading-spinner{display:inline-block;width:16px;height:16px;border:3px solid #ecf0f1;border-top:3px solid #8e44ad;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.password-strength{height:4px;border-radius:4px;margin-top:6px;transition:width .4s;background:#e0e0e0}.password-strength.weak{width:33%;background:#e74c3c}.password-strength.medium{width:66%;background:#f39c12}.password-strength.strong{width:100%;background:#27ae60}
.version{text-align:center;font-size:10px;color:#bdc3c7;margin-top:8px}
</style></head>
<body>
<div id="toast" class="toast"></div>
<div class="login-container">
  <div class="login-header"><div class="logo">🏥</div><h1>MTWARA PERFORMANCE</h1><p>Mfumo wa Tathmini ya Utendaji</p><span class="badge">Toleo v11.0</span></div>
  <div class="connection-status" id="connectionStatus"><span class="loading-spinner"></span> Inaunganisha...</div>
  <div class="tab-buttons"><button class="btn active" id="loginTabBtn" onclick="switchTab('login')">🔐 Ingia</button><button class="btn inactive" id="signupTabBtn" onclick="switchTab('signup')">📝 Jisajili</button></div>
  
  <div id="loginTab" class="tab-content active">
    <div class="form-group"><label>👤 Jina la Mtumiaji au Barua Pepe</label><input type="text" id="loginUsername" placeholder="Weka username au email" value="worker"></div>
    <div class="form-group"><label>🔑 Nenosiri</label><div class="password-wrapper"><input type="password" id="loginPassword" placeholder="Weka nenosiri" value="1234"><button class="toggle-password" onclick="togglePasswordVisibility('loginPassword',this)">👁️</button></div></div>
    <div class="checkbox-group"><input type="checkbox" id="rememberMe" checked><label for="rememberMe">🔒 Nikumbuke</label></div>
    <button class="btn btn-primary" onclick="login()" id="loginBtn">🔓 Ingia</button>
    <div class="divider">Au</div><button class="btn btn-secondary" onclick="switchTab('signup')">📝 Jisajili Sasa</button>
  </div>
  
  <div id="signupTab" class="tab-content">
    <div class="form-group"><label>👤 Jina la Mtumiaji</label><input type="text" id="signupUsername" placeholder="Chagua username"><div class="form-hint" id="usernameHint" style="font-size:11px;color:#7f8c8d;margin-top:4px;">Angalia upatikanaji</div></div>
    <div class="form-group"><label>📧 Barua Pepe</label><input type="email" id="signupEmail" placeholder="Weka barua pepe"></div>
    <div class="form-group"><label>🔑 Nenosiri</label><div class="password-wrapper"><input type="password" id="signupPassword" placeholder="Weka nenosiri" oninput="checkPasswordStrength(this.value)"><button class="toggle-password" onclick="togglePasswordVisibility('signupPassword',this)">👁️</button></div><div class="password-strength" id="passwordStrength"></div><div style="font-size:11px;color:#7f8c8d;margin-top:3px;" id="passwordStrengthLabel"></div></div>
    <div class="form-group"><label>🔑 Thibitisha Nenosiri</label><div class="password-wrapper"><input type="password" id="signupPasswordConfirm" placeholder="Andika tena"><button class="toggle-password" onclick="togglePasswordVisibility('signupPasswordConfirm',this)">👁️</button></div><div id="passwordMatchHint" style="font-size:11px;color:#7f8c8d;margin-top:4px;">Nenosiri lazima zilandane</div></div>
    <div class="form-group"><label>📋 Jukumu</label><select id="signupRole"><option value="worker">👤 Mtendakazi</option><option value="supervisor">👔 Msimamizi</option><option value="incharge">🏥 Mganga Mfawidhi</option></select></div>
    <button class="btn btn-primary" onclick="signup()" id="signupBtn">📝 Jisajili</button>
    <div class="divider">Au</div><button class="btn btn-secondary" onclick="switchTab('login')">🔐 Ingia kwenye Akaunti</button>
  </div>
  <div class="version">Toleo 11.0 - Maboresho Yote</div>
</div>

<script>
// ============================ CONFIG ============================
const API_KEY="$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K",BIN_ID="6a4b0bc9da38895dfe32cc08";
function showToast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.classList.remove('show'),3500)}
function togglePasswordVisibility(i,b){const e=document.getElementById(i);e.type==='password'?(e.type='text',b.textContent='🙈'):(e.type='password',b.textContent='👁️')}
function switchTab(t){document.getElementById('loginTab').classList.toggle('active',t==='login');document.getElementById('signupTab').classList.toggle('active',t==='signup');document.getElementById('loginTabBtn').className='btn '+(t==='login'?'active':'inactive');document.getElementById('signupTabBtn').className='btn '+(t==='signup'?'active':'inactive')}

// ============================ PASSWORD STRENGTH ============================
function checkPasswordStrength(p){const s=document.getElementById('passwordStrength'),l=document.getElementById('passwordStrengthLabel');if(p.length<4){s.className='password-strength';l.textContent='Dhaifu - Angalau herufi 4';return}let score=0;if(p.length>=8)score++;if(/[a-z]/.test(p))score++;if(/[A-Z]/.test(p))score++;if(/\d/.test(p))score++;if(/[^a-zA-Z0-9]/.test(p))score++;if(score<=2){s.className='password-strength weak';l.textContent='⚠️ Dhaifu' }else if(score<=3){s.className='password-strength medium';l.textContent='🟡 Wastani'}else{s.className='password-strength strong';l.textContent='✅ Nzuri'}}
document.getElementById('signupPassword').addEventListener('input',function(){checkPasswordStrength(this.value)});

// ============================ USERNAME AVAILABILITY ============================
document.getElementById('signupUsername').addEventListener('input',async function(){const u=this.value.trim(),h=document.getElementById('usernameHint');if(u.length<3){h.innerHTML='⚠️ Username lazima iwe na herufi 3 au zaidi';h.style.color='#f39c12';return}try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error;const d=await r.json(),us=d.record?.users||{};us[u]?(h.innerHTML='❌ Username tayari imechukuliwa',h.style.color='#e74c3c'):(h.innerHTML='✅ Username inapatikana',h.style.color='#27ae60')}catch(e){h.innerHTML='⚠️ Hitilafu ya muunganisho';h.style.color='#f39c12'}});

// ============================ PASSWORD MATCH ============================
document.getElementById('signupPassword').addEventListener('input',checkMatch);
document.getElementById('signupPasswordConfirm').addEventListener('input',checkMatch);
function checkMatch(){const p1=document.getElementById('signupPassword').value,p2=document.getElementById('signupPasswordConfirm').value,h=document.getElementById('passwordMatchHint');if(p1&&p2){if(p1===p2){h.innerHTML='✅ Nenosiri zinalingana';h.style.color='#27ae60'}else{h.innerHTML='❌ Nenosiri hazilingani';h.style.color='#e74c3c'}}else{h.innerHTML='Nenosiri lazima zilandane';h.style.color='#7f8c8d'}}

// ============================ SIGNUP ============================
async function signup(){const u=document.getElementById('signupUsername').value.trim(),e=document.getElementById('signupEmail').value.trim(),p=document.getElementById('signupPassword').value,c=document.getElementById('signupPasswordConfirm').value,r=document.getElementById('signupRole').value,b=document.getElementById('signupBtn');if(!u||u.length<3)return showToast('❌ Username lazima iwe na herufi 3 au zaidi','error');if(!e||!e.includes('@'))return showToast('❌ Tafadhali ingiza barua pepe sahihi','error');if(!p||p.length<4)return showToast('❌ Nenosiri lazima iwe na herufi 4 au zaidi','error');if(p!==c)return showToast('❌ Nenosiri hazilingani','error');b.disabled=true;b.innerHTML='<span class="loading-spinner"></span> Inajisajili...';try{const r1=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r1.ok)throw new Error('Network error');const d=await r1.json(),rec=d.record||{};if(!rec.users)rec.users={};if(rec.users[u]){showToast('❌ Username tayari imechukuliwa','error');b.disabled=false;b.innerHTML='📝 Jisajili';return}if(Object.values(rec.users).find(x=>x.email===e)){showToast('❌ Barua pepe tayari inatumika','error');b.disabled=false;b.innerHTML='📝 Jisajili';return}rec.users[u]={password:p,role:r,email:e};if(!rec.appraisals)rec.appraisals={};['worker','supervisor','incharge'].forEach(ro=>{if(!rec.appraisals[ro])rec.appraisals[ro]={}});if(!rec.settings)rec.settings={};if(!rec.settings.deadline)rec.settings.deadline=null;if(!rec.chat)rec.chat={};const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)});if(!up.ok)throw new Error('Imeshindwa kuhifadhi');showToast(`✅ Akaunti imeundwa! Karibu ${u}`,'success');document.getElementById('loginUsername').value=u;switchTab('login');b.disabled=false;b.innerHTML='📝 Jisajili'}catch(e){showToast('❌ '+e.message,'error');b.disabled=false;b.innerHTML='📝 Jisajili'}}

// ============================ LOGIN ============================
async function login(){const u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value.trim(),b=document.getElementById('loginBtn'),rem=document.getElementById('rememberMe').checked;if(!u||!p)return showToast('❌ Tafadhali jaza sehemu zote','error');b.disabled=true;b.innerHTML='<span class="loading-spinner"></span> Inaingiza...';try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});if(!r.ok)throw new Error('Network error');const d=await r.json(),us=d.record?.users||{};let user=null,username=null;for(const [key,val] of Object.entries(us)){if(key===u||val.email===u){user=val;username=key;break}}if(!user||user.password!==p){showToast('❌ Jina/Barua pepe au nenosiri si sahihi','error');b.disabled=false;b.innerHTML='🔓 Ingia';return}if(rem){localStorage.setItem('mtwara_user',JSON.stringify({username,email:user.email,role:user.role,timestamp:Date.now()}))}else{localStorage.removeItem('mtwara_user')}const ud=encodeURIComponent(JSON.stringify({username,role:user.role})),red=user.role==='worker'?'worker.html':user.role==='supervisor'?'supervisor.html':'incharge.html';showToast(`✅ Karibu ${username}`,'success');setTimeout(()=>{window.location.href=`${red}?user=${ud}`},500)}catch(e){showToast('❌ '+e.message,'error');b.disabled=false;b.innerHTML='🔓 Ingia'}}

// ============================ CHECK CONNECTION ============================
async function checkConnection(){const s=document.getElementById('connectionStatus');try{const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}});s.innerHTML=r.ok?'✅ Imeunganishwa':'⚠️ Hitilafu ya muunganisho'}catch(e){s.innerHTML='⚠️ Hakuna mtandao'}}

// ============================ ENTER KEY ============================
document.addEventListener('keydown',e=>{if(e.key==='Enter'){const a=document.querySelector('.tab-content.active');if(a.id==='loginTab')login();else if(a.id==='signupTab')signup()}});

// ============================ REMEMBER ME ============================
window.onload=function(){checkConnection();const saved=localStorage.getItem('mtwara_user');if(saved){try{const data=JSON.parse(saved);if(data.username){document.getElementById('loginUsername').value=data.username;document.getElementById('loginPassword').focus()}}catch(e){}}console.log('✅ MTWARA v11.0')};
</script>
</body>
</html>
