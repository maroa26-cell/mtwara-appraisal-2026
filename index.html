
<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuingia - Mfumo wa Tathmini</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e8f0fe;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            padding: 40px 30px;
            max-width: 480px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 16px;
        }
        .logo img {
            max-height: 70px;
            width: auto;
        }
        h1 {
            text-align: center;
            color: #0b3b5c;
            font-size: 26px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #cfddee;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            background: #f9fcff;
        }
        input:focus, select:focus {
            border-color: #1a73e8;
            outline: none;
            background: white;
            box-shadow: 0 0 0 4px rgba(26,115,232,0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26,115,232,0.3);
        }
        .extra-field {
            background: #f3f8ff;
            padding: 15px 18px;
            border-radius: 16px;
            border-left: 5px solid #1a73e8;
            margin: 10px 0;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .success-msg {
            color: #2e7d32;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
        .footer-note {
            margin-top: 25px;
            text-align: center;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <!-- Badilisha src na URL ya logo yako -->
        <img src="https://via.placeholder.com/150x70?text=MTWARA+SDA+DISPENSARY" alt="Mtwara SDA Dispensary" />
    </div>
    <h1>🏥 Tathmini ya Utendaji</h1>
    <p class="subtitle">Mwaka 2026 – Mkoa wa Mtwara</p>

    <form id="loginForm">
        <div class="form-group">
            <label>Jina lako kamili</label>
            <input type="text" id="fullName" placeholder="Mfano: Agatha Tonya" required />
        </div>
        <div class="form-group">
            <label>Namba ya Simu au Barua Pepe</label>
            <input type="text" id="userCredential" placeholder="0712 345 678 au email@mfano.com" required />
        </div>
        <div class="form-group">
            <label>Jukumu lako</label>
            <select id="roleSelect" required>
                <option value="">-- Chagua --</option>
                <option value="worker">Mtendakazi</option>
                <option value="supervisor">Msimamizi</option>
                <option value="incharge">Mganga Mfawidhi</option>
            </select>
        </div>
        <div id="inchargeNumberField" class="extra-field" style="display:none;">
            <label>📱 Namba ya Mganga Mfawidhi (mpokeaji wa ripoti)</label>
            <input type="text" id="inchargePhone" placeholder="0712 345 678" />
            <small style="color:#555; font-size:12px;">Hii ndio namba ambayo ripoti yako itatumwa kwa WhatsApp.</small>
        </div>
        <div id="inchargeSelfField" class="extra-field" style="display:none;">
            <label>📱 Namba yako ya simu (Mganga Mfawidhi)</label>
            <input type="text" id="inchargeSelfPhone" placeholder="0712 345 678" />
            <small style="color:#555; font-size:12px;">Namba hii itatumiwa kama mpokeaji wa tathmini zote.</small>
        </div>
        <button type="submit" class="btn-primary">🔑 Ingia</button>
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>
    </form>
    <div class="footer-note">
        Mfumo wa Tathmini ya Watendaji wa Afya – Mtwara 2026
    </div>
</div>

<script>
    (function() {
        const roleSelect = document.getElementById('roleSelect');
        const inchargeNumberField = document.getElementById('inchargeNumberField');
        const inchargeSelfField = document.getElementById('inchargeSelfField');
        const inchargePhone = document.getElementById('inchargePhone');
        const inchargeSelfPhone = document.getElementById('inchargeSelfPhone');

        roleSelect.addEventListener('change', function() {
            const role = this.value;
            inchargeNumberField.style.display = (role === 'worker' || role === 'supervisor') ? 'block' : 'none';
            inchargeSelfField.style.display = (role === 'incharge') ? 'block' : 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const credential = document.getElementById('userCredential').value.trim();
            const role = roleSelect.value;

            if (!fullName || !credential || !role) {
                showError('Tafadhali jaza sehemu zote muhimu.');
                return;
            }
            if ((role === 'worker' || role === 'supervisor') && !inchargePhone.value.trim()) {
                showError('Tafadhali weka namba ya Mganga Mfawidhi.');
                return;
            }
            if (role === 'incharge' && !inchargeSelfPhone.value.trim()) {
                showError('Tafadhali weka namba yako ya simu.');
                return;
            }

            const user = {
                username: fullName,
                role: role,
                credential: credential,
                inchargePhone: (role === 'worker' || role === 'supervisor') ? inchargePhone.value.trim() : null,
                inchargeSelfPhone: (role === 'incharge') ? inchargeSelfPhone.value.trim() : null
            };
            if (role === 'incharge') {
                user.inchargePhone = inchargeSelfPhone.value.trim();
            }
            localStorage.setItem('appraisalUser', JSON.stringify(user));

            const baseUrl = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
            let targetPage = '';
            if (role === 'worker') targetPage = 'worker.html';
            else if (role === 'supervisor') targetPage = 'supervisor.html';
            else if (role === 'incharge') targetPage = 'incharge.html';

            const param = encodeURIComponent(JSON.stringify(user));
            window.location.href = baseUrl + targetPage + '?user=' + param;
            showSuccess('Ingizo limekubaliwa. Unaelekezwa...');
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        const params = new URLSearchParams(window.location.search);
        const userParam = params.get('user');
        if (userParam) {
            try {
                const user = JSON.parse(decodeURIComponent(userParam));
                if (user.username) document.getElementById('fullName').value = user.username;
                if (user.credential) document.getElementById('userCredential').value = user.credential;
                if (user.role) {
                    roleSelect.value = user.role;
                    roleSelect.dispatchEvent(new Event('change'));
                    if (user.inchargePhone) {
                        if (user.role === 'worker' || user.role === 'supervisor') {
                            document.getElementById('inchargePhone').value = user.inchargePhone;
                        }
                        if (user.role === 'incharge') {
                            document.getElementById('inchargeSelfPhone').value = user.inchargePhone;
                        }
                    }
                }
            } catch(e) {}
        }
    })();
</script>
</body>
</html>
