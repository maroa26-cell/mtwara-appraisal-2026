
<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tathmini ya Kimataifa</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI', Tahoma, sans-serif; background:linear-gradient(135deg,#1a5276,#2980b9); min-height:100vh; padding:20px; display:flex; justify-content:center; align-items:flex-start; }
    .container { background:#fff; border-radius:28px; padding:35px 30px; max-width:1100px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.2); margin-top:20px; }
    h2 { color:#1a5276; text-align:center; font-size:28px; margin-bottom:6px; }
    .sub { text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:25px; }
    .logo-area { text-align:center; margin-bottom:16px; }
    .logo-area img { max-height:80px; max-width:100%; border-radius:8px; }
    .lang-toggle { display:flex; justify-content:center; gap:12px; margin-bottom:20px; }
    .lang-toggle button { padding:6px 20px; border:2px solid #1a5276; border-radius:20px; background:transparent; color:#1a5276; font-weight:600; cursor:pointer; transition:0.3s; }
    .lang-toggle button.active { background:#1a5276; color:#fff; }
    .lang-toggle button:hover { background:#1a5276; color:#fff; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:20px; }
    .top-bar .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { padding:8px 18px; border:none; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer; transition:0.3s; display:inline-flex; align-items:center; gap:6px; text-decoration:none; }
    .btn-primary { background:#1a5276; color:#fff; }
    .btn-primary:hover { background:#154360; transform:translateY(-2px); }
    .btn-secondary { background:#95a5a6; color:#fff; }
    .btn-secondary:hover { background:#7f8c8d; }
    .btn-danger { background:#e74c3c; color:#fff; }
    .btn-danger:hover { background:#c0392b; }
    .btn-info { background:#3498db; color:#fff; }
    .btn-info:hover { background:#2e86c1; }
    .btn-warning { background:#f39c12; color:#fff; }
    .btn-warning:hover { background:#d68910; }
    .btn-success { background:#27ae60; color:#fff; }
    .btn-success:hover { background:#1e8449; }
    .btn-purple { background:#8e44ad; color:#fff; }
    .btn-purple:hover { background:#7d3c98; }
    .btn-whatsapp { background:#25D366; color:#fff; }
    .btn-whatsapp:hover { background:#1da851; }
    .btn-email { background:#D44638; color:#fff; }
    .btn-email:hover { background:#b03a2e; }
    .btn-pdf { background:#e74c3c; color:#fff; }
    .btn-pdf:hover { background:#c0392b; }
    .section { background:#f8f9fa; border-radius:16px; padding:20px 22px; margin-bottom:20px; border-left:5px solid #1a5276; }
    .section h3 { color:#1a5276; font-size:18px; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .section h3 .step { background:#1a5276; color:#fff; border-radius:50%; width:28px; height:28px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; }
    .section h3 .badge-global { background:#2980b9; color:#fff; padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group { margin-bottom:6px; }
    .form-group.full { grid-column:1/-1; }
    .form-group label { display:block; font-weight:600; color:#1a5276; margin-bottom:4px; font-size:13px; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px 14px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; transition:0.3s; background:#fff; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#1a5276; outline:none; box-shadow:0 0 0 3px rgba(26,82,118,0.15); }
    .form-group textarea { min-height:70px; resize:vertical; }
    .checkbox-group { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px; }
    .checkbox-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:#fff; border-radius:8px; border:1px solid #e0e0e0; cursor:pointer; transition:0.2s; }
    .checkbox-item:hover { background:#eaf2f8; }
    .checkbox-item input[type="checkbox"] { width:18px; height:18px; accent-color:#1a5276; cursor:pointer; }
    .comms { background:#f8f9fa; padding:12px 18px; border-radius:12px; display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-bottom:20px; border:1px solid #e0e0e0; }
    .comms span { font-weight:600; color:#1a5276; }
    .status-badge { display:inline-block; padding:4px 14px; border-radius:20px; font-size:12px; font-weight:600; }
    .status-badge.saved { background:#d4edda; color:#155724; }
    .status-badge.pending { background:#fff3cd; color:#856404; }
    .status-badge.submitted { background:#cce5ff; color:#004085; }
    .button-group { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:20px; }
    .button-group .btn { padding:12px 24px; font-size:14px; }
    .signature-area { border:2px solid #1a5276; border-radius:12px; padding:10px; background:#fff; margin-top:8px; }
    .signature-area canvas { width:100%; height:150px; border-radius:8px; background:#fff; cursor:crosshair; touch-action:none; }
    .signature-area .sig-actions { display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .send-container { background:#eaf2f8; border:2px dashed #1a5276; border-radius:12px; padding:16px; margin-top:12px; }
    .send-container h4 { color:#1a5276; margin-bottom:8px; }
    .send-container .radio-group { display:flex; gap:15px; flex-wrap:wrap; margin-top:8px; }
    .send-container .radio-group label { font-size:14px; cursor:pointer; }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); max-width:450px; width:90%; padding:14px 22px; border-radius:14px; color:#fff; text-align:center; z-index:999; opacity:0; transition:0.4s; box-shadow:0 8px 40px rgba(0,0,0,0.2); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.success { background:#27ae60; }
    .toast.error { background:#e74c3c; }
    .toast.info { background:#3498db; }
    .loading { display:inline-block; width:16px; height:16px; border:3px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media(max-width:768px){ .form-grid { grid-template-columns:1fr; } .checkbox-group { grid-template-columns:1fr; } .top-bar { flex-direction:column; align-items:stretch; } .button-group .btn { flex:1; } }
    @media print { .no-print { display:none !important; } .container { box-shadow:none !important; } body { background:#fff !important; } }
  </style>
</head>
<body>
  <div class="container" id="printArea">
    <div class="top-bar no-print">
      <h2 style="margin:0;">🌍 Tathmini ya Kimataifa</h2>
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Nyumbani</button>
        <button class="btn btn-info" onclick="window.print()">🖨️ Chapisha</button>
        <button class="btn btn-pdf" onclick="generatePDF()">📄 PDF</button>
      </div>
    </div>
    <div class="logo-area"><img src="SDA_CHURCH_LOGO.webp" alt="SDA Logo"><br><small style="color:#7f8c8d;">Logo ya SDA Church</small></div>
    <div class="sub" id="greeting">Karibu katika Tathmini ya Kimataifa</div>

    <div class="lang-toggle no-print">
      <button class="active" onclick="setLanguage('sw')">🇹🇿 Kiswahili</button>
      <button onclick="setLanguage('en')">🇬🇧 English</button>
    </div>

    <div class="comms no-print">
      <span>📞 Mawasiliano:</span>
      <a href="tel:+255742710697" class="btn btn-phone" style="padding:4px 14px;font-size:13px;">📱 Simu</a>
      <span style="font-size:13px;color:#7f8c8d;margin-left:auto;" id="submissionStatus">📤 Hujatumwa</span>
    </div>

    <!-- Sehemu 1-8 zimeshafupishwa kwa nafasi, zipo sawa na worker.html -->
    <!-- (Zimefupishwa, lakini zipo sawa na worker.html) -->

    <!-- Vitufe -->
    <div class="button-group no-print">
      <button class="btn btn-primary" onclick="saveGlobalAppraisal()" id="saveBtn">💾 Hifadhi</button>
      <button class="btn btn-info" onclick="submitGlobalAppraisal()" id="submitBtn">📤 Tuma</button>
      <button class="btn btn-secondary" onclick="loadGlobalAppraisal()">📂 Pakia</button>
      <button class="btn btn-danger" onclick="deleteGlobalAppraisal()">🗑️ Futa</button>
      <button class="btn btn-success" onclick="exportPDFGlobal()">📄 PDF</button>
      <button class="btn btn-whatsapp" onclick="sendWhatsAppGlobal()">💬 WhatsApp</button>
      <button class="btn btn-email" onclick="sendEmailGlobal()">📧 Email</button>
      <button class="btn btn-danger" onclick="logout()">🚪 Toka</button>
    </div>
    <div style="text-align:center;margin-top:12px;"><span id="saveStatus" class="status-badge pending">📝 Hajahifadhiwa</span></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const API_KEY = "$2a$10$3fwo6GCFzD2eBj8Tyjv5ie/7zZ6s5udPp40kvojq/ZpYPH47Q.C8K";
    const BIN_ID = "6a4b0bc9da38895dfe32cc08";

    function showToast(m,t){ const e=document.getElementById('toast'); e.textContent=m; e.className='toast '+t+' show'; setTimeout(()=>e.classList.remove('show'),3500); }
    function getUsername(){ const p=new URLSearchParams(window.location.search).get('user'); if(!p) return null; try{ return JSON.parse(decodeURIComponent(p)).username; } catch(e){ return null; } }
    const username = getUsername() || 'global_user';
    document.getElementById('greeting').textContent = `Karibu ${username} - Tathmini ya Kimataifa`;

    let currentLang = 'sw';
    function setLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-toggle button').forEach(b => b.classList.remove('active'));
      if (lang === 'sw') document.querySelector('.lang-toggle button:first-child').classList.add('active');
      else document.querySelector('.lang-toggle button:last-child').classList.add('active');
    }

    // ========================= SIGNATURE =========================
    let canvas, ctx, isDrawing = false, hasSignature = false;
    function initSignature() {
      canvas = document.getElementById('signatureCanvas');
      ctx = canvas.getContext('2d');
      canvas.width = canvas.parentElement.clientWidth - 20;
      canvas.height = 150;
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#1a5276';
      canvas.addEventListener('mousedown', startDraw);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDraw);
      canvas.addEventListener('mouseleave', stopDraw);
      canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
      canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); }, { passive: false });
      canvas.addEventListener('touchend', e => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup', {})); }, { passive: false });
    }
    function getPos(e) { const rect = canvas.getBoundingClientRect(); return { x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height) }; }
    function startDraw(e) { isDrawing = true; hasSignature = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!isDrawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDraw() { isDrawing = false; }
    function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSignature = false; showToast('🗑️ Sahihi imefutwa', 'info'); }
    function getSignatureData() { if (!hasSignature) return ''; return canvas.toDataURL('image/png'); }
    function setSignatureData(dataUrl) { if (!dataUrl) { clearSignature(); return; } const img = new Image(); img.onload = function() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); hasSignature = true; }; img.src = dataUrl; }

    function getCheckedValues(c){ return Array.from(document.querySelectorAll(`#${c} input[type="checkbox"]:checked`)).map(x=>x.value); }
    function setCheckboxes(c,v){ document.querySelectorAll(`#${c} input[type="checkbox"]`).forEach(x=>x.checked=v.includes(x.value)); }

    document.querySelectorAll('input[name="sendMethod"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const label = document.querySelector('#recipientField label');
        if (this.value === 'whatsapp') {
          label.innerHTML = 'Namba ya WhatsApp ya mpokeaji <span style="color:#e74c3c;">*</span>';
          document.getElementById('recipient').placeholder = 'Mfano: 255742710697';
        } else {
          label.innerHTML = 'Barua Pepe ya mpokeaji <span style="color:#e74c3c;">*</span>';
          document.getElementById('recipient').placeholder = 'Mfano: mtu@email.com';
        }
      });
    });

    // ========================= GET FORM DATA =========================
    function getFormData(){ return {
      username, role:'global',
      fullname:document.getElementById('fullname')?.value||'',
      department:document.getElementById('department')?.value||'',
      position:document.getElementById('position')?.value||'',
      phone:document.getElementById('phone')?.value||'',
      email:document.getElementById('email')?.value||'',
      kpi_productivity:+document.getElementById('kpi_productivity')?.value||0,
      kpi_quality:+document.getElementById('kpi_quality')?.value||0,
      kpi_patients:+document.getElementById('kpi_patients')?.value||0,
      kpi_satisfaction:+document.getElementById('kpi_satisfaction')?.value||0,
      kpi_notes:document.getElementById('kpi_notes')?.value||'',
      strategic_goals:document.getElementById('strategic_goals')?.value||'',
      strategic_achievement:+document.getElementById('strategic_achievement')?.value||0,
      strategic_timeline:+document.getElementById('strategic_timeline')?.value||0,
      skill_technical:+document.getElementById('skill_technical')?.value||0,
      skill_communication:+document.getElementById('skill_communication')?.value||0,
      skill_leadership:+document.getElementById('skill_leadership')?.value||0,
      skill_problem:+document.getElementById('skill_problem')?.value||0,
      skill_notes:document.getElementById('skill_notes')?.value||'',
      training_attended:document.getElementById('training_attended')?.value||'',
      training_needed:document.getElementById('training_needed')?.value||'',
      training_hours:+document.getElementById('training_hours')?.value||0,
      training_last_date:document.getElementById('training_last_date')?.value||'',
      general_duties:getCheckedValues('generalDutiesContainer').concat(document.getElementById('generalDutiesOther')?.value||'').filter(Boolean).join(', '),
      specific_duties:getCheckedValues('specificDutiesContainer').concat(document.getElementById('specificDutiesOther')?.value||'').filter(Boolean).join(', '),
      strengths:document.getElementById('strengths')?.value||'',
      weaknesses:document.getElementById('weaknesses')?.value||'',
      recommendations:document.getElementById('recommendations')?.value||'',
      overall_comments:document.getElementById('overall_comments')?.value||'',
      signature_name:document.getElementById('signature_name')?.value||'',
      signature_date:document.getElementById('signature_date')?.value||'',
      signature_data:getSignatureData(),
      signature_notes:document.getElementById('signature_notes')?.value||'',
      send_method:document.querySelector('input[name="sendMethod"]:checked')?.value||'whatsapp',
      recipient:document.getElementById('recipient')?.value?.trim()||'',
      save_method:document.querySelector('input[name="saveMethod"]:checked')?.value||'jsonbin',
      status:'pending', submitted_to:null, timestamp:new Date().toISOString()
    }}

    function setFormData(d){ ['fullname','department','position','phone','email','kpi_productivity','kpi_quality','kpi_patients','kpi_satisfaction','kpi_notes','strategic_goals','strategic_achievement','strategic_timeline','skill_technical','skill_communication','skill_leadership','skill_problem','skill_notes','training_attended','training_needed','training_hours','training_last_date','strengths','weaknesses','recommendations','overall_comments','signature_name','signature_date','signature_notes','recipient'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=d[id]||''; }); setCheckboxes('generalDutiesContainer', d.general_duties ? d.general_duties.split(', ') : []); setCheckboxes('specificDutiesContainer', d.specific_duties ? d.specific_duties.split(', ') : []); if(document.getElementById('generalDutiesOther')) document.getElementById('generalDutiesOther').value=''; if(document.getElementById('specificDutiesOther')) document.getElementById('specificDutiesOther').value=''; if(d.signature_data) setSignatureData(d.signature_data); if(d.send_method){ const radio=document.querySelector(`input[name="sendMethod"][value="${d.send_method}"]`); if(radio) radio.checked=true; } if(d.save_method){ const radio=document.querySelector(`input[name="saveMethod"][value="${d.save_method}"]`); if(radio) radio.checked=true; } updateStatus(d.status||'pending'); }

    function updateStatus(s){ const map={'saved':['saved','💾 Imehifadhiwa'],'submitted':['submitted','📤 Imetumwa'],'pending':['pending','📝 Hajahifadhiwa']}; const c=map[s]||map.pending; const b=document.getElementById('saveStatus'); if(b){ b.className='status-badge '+c[0]; b.textContent=c[1]; } }

    // ========================= SAVE =========================
    async function saveGlobalAppraisal(){ const b=document.getElementById('saveBtn'); if(!b) return; b.disabled=true; b.innerHTML='<span class="loading"></span> Inahifadhi...'; const d=getFormData(); d.status='saved'; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); if(!res.record) res.record={}; const rec=res.record; if(!rec.global_appraisals) rec.global_appraisals={}; rec.global_appraisals[username]=d; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kuhifadhi'); showToast('✅ Imehifadhiwa!','success'); updateStatus('saved'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } b.disabled=false; b.innerHTML='💾 Hifadhi'; }

    // ========================= SUBMIT =========================
    async function submitGlobalAppraisal(){ const b=document.getElementById('submitBtn'); if(!b) return; b.disabled=true; b.innerHTML='<span class="loading"></span> Inatuma...'; const d=getFormData(); if(!d.fullname||!d.department||!d.position){ showToast('❌ Jaza Jina, Idara na Cheo','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } if(!d.signature_name||!d.signature_date){ showToast('❌ Jaza Sahihi (Jina na Tarehe)','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } if(!hasSignature){ showToast('❌ Tafadhali chora sahihi yako','error'); b.disabled=false; b.innerHTML='📤 Tuma'; return; } d.status='submitted'; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); if(!res.record) res.record={}; const rec=res.record; if(!rec.global_appraisals) rec.global_appraisals={}; rec.global_appraisals[username]=d; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kutuma'); showToast(`✅ Imetumwa!`,'success'); updateStatus('submitted'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } b.disabled=false; b.innerHTML='📤 Tuma'; }

    // ========================= LOAD =========================
    async function loadGlobalAppraisal(){ try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); const rec=res.record||{}; const d=rec.global_appraisals?.[username]; if(!d){ updateStatus('pending'); return; } setFormData(d); showToast('✅ Imepakiwa','success'); } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } }

    // ========================= DELETE =========================
    async function deleteGlobalAppraisal(){ if(!confirm('Futa tathmini hii?')) return; try{ const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{headers:{'X-Master-Key':API_KEY}}); if(!r.ok) throw new Error('Network error'); const res=await r.json(); const rec=res.record||{}; if(rec.global_appraisals?.[username]){ delete rec.global_appraisals[username]; const up=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(rec)}); if(!up.ok) throw new Error('Imeshindwa kufuta'); showToast('✅ Imehifadhiwa','success'); updateStatus('pending'); } else { showToast('❌ Hakuna tathmini','error'); } } catch(e){ showToast('❌ '+e.message,'error'); console.error(e); } }

    // ========================= PDF =========================
    async function generatePDF() {
      showToast('⏳ Inatengeneza PDF...', 'info');
      try {
        const element = document.getElementById('printArea');
        const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false });
        const imgData = canvas.toDataURL('image/png');
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = doc.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
        let heightLeft = pdfHeight, position = 0;
        doc.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
        heightLeft -= doc.internal.pageSize.getHeight();
        while (heightLeft > 0) {
          position = heightLeft - pdfHeight;
          doc.addPage();
          doc.addImage(imgData, 'PNG', 0, position, pdfWidth, pdfHeight);
          heightLeft -= doc.internal.pageSize.getHeight();
        }
        doc.save(`Tathmini_Global_${username}_${new Date().toISOString().slice(0,10)}.pdf`);
        showToast('✅ PDF imehifadhiwa!', 'success');
      } catch(e){ showToast('❌ Hitilafu: '+e.message,'error'); console.error(e); }
    }
